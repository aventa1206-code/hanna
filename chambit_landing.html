<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>참빛북클럽 — 맥그로힐 원더스 기반 빅데이터 영어 독서</title>
<meta name="description" content="미국 국공립 초등 읽기 교재 맥그로힐 원더스(Wonders)와 빅데이터 기반 영어 독서 서비스. 14일 무료 체험으로 시작하세요." />
<meta property="og:title" content="참빛북클럽 — 맥그로힐로 시작하는 영어 독서" />
<meta property="og:description" content="14일 무료 체험으로 시작하는 빅데이터 기반 영어 독서 서비스" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
    background: #ffffff; color: #111;
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
  }
  #root { width: 100%; overflow-x: hidden; }

  /* 스크롤 등장 애니메이션 — JS 미실행 시 .armed 미부여로 항상 표시(§5 정적 폴백) */
  .reveal { transition: opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); }
  .reveal.armed { opacity: 0; }
  .reveal.armed.tf { transform: translateY(34px); will-change: opacity, transform; }
  .reveal.in { opacity: 1 !important; transform: none !important; }

  /* 카카오톡 1:1 상담 플로팅 버튼 — 항상 노출 + 은은한 부유 */
  .kakaoFloat {
    position: fixed; right: 18px; bottom: 18px; z-index: 9999;
    width: 62px; height: 62px; display: block; border-radius: 50%;
    box-shadow: 0 6px 18px rgba(0,0,0,0.22);
    animation: kfloat 2.8s ease-in-out infinite;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .kakaoFloat img { width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 50%; }
  .kakaoFloat:hover { transform: translateY(-4px) scale(1.05); box-shadow: 0 10px 24px rgba(0,0,0,0.28); }
  .kakaoFloat:active { transform: scale(0.96); }
  .kakaoFloat:focus-visible { outline: 3px solid #FF6427; outline-offset: 3px; }
  @keyframes kfloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @media (prefers-reduced-motion: reduce) { .kakaoFloat { animation: none; } .reveal { transition: none; } }

  .nojs-fallback {
    display: none; padding: 40px 20px; text-align: center;
    font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif; color: #333; line-height: 1.7;
  }
  .nojs-fallback a {
    display: inline-block; margin-top: 16px; padding: 14px 28px;
    background: #FF6427; color: #fff; border-radius: 70px; font-weight: 700; text-decoration: none;
  }
</style>
</head>
<body>
<div id="root"></div>

<a class="kakaoFloat" href="https://pf.kakao.com/_bPJub/chat" target="_blank" rel="noopener noreferrer" aria-label="카카오톡 1:1 상담 바로가기">
  <img src="https://cdn.bookclubs.co.kr/chambit_main/talk.png" alt="카카오톡 상담" />
</a>

<noscript>
  <div class="nojs-fallback" style="display:block">
    <h1>맥그로힐로 시작하는 참빛북클럽</h1>

  </div>
</noscript>

        * { box-sizing: border-box; }

        .header {
          width: 100vw;
          max-width: 100%;
          overflow-x: hidden;
          background: #ffffff;
          display: flex;
          justify-content: center;            /* \uC13C\uD130 \uC815\uB82C \uC720\uC9C0 */
          font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
        }
        .headerInner {
          width: 100%;
          max-width: 1200px;                  /* \uC13C\uD130\uAC12 \uC720\uC9C0 */
          padding: 0 24px;
          display: flex;
          align-items: center;
        }

        .logo {
          height: auto;
          display: block;
          flex-shrink: 0;
          cursor: pointer;
        }

        .nav {
          display: flex;
          align-items: center;
          font-size: 16px;
          line-height: 24px;
          white-space: nowrap;
          flex-shrink: 0;
        }
        .navLink {
          background: none; border: 0; padding: 0; font: inherit;
          cursor: pointer; text-decoration: none; transition: color 0.15s ease;
        }
        .navHome { color: #111111; font-weight: 800; }
        .navItem { color: #999999; font-weight: 500; }
        .navItem:hover { color: #111111; }
        .navHome:hover { opacity: 0.7; }

        .actions {
          margin-left: auto;
          display: flex;
          align-items: center;
          gap: 26px;
          white-space: nowrap;
          flex-shrink: 0;          /* \uBC84\uD2BC \uC601\uC5ED\uC740 \uC808\uB300 \uC548 \uC904\uACE0 \uC548 \uBC00\uB9BC */
          padding-left: 24px;
        }
        .enterButton {
          display: inline-flex; align-items: center; justify-content: center;
          min-width: 171px; height: 50px; border: 0; border-radius: 999px;
          background: #050505; color: #ffffff; font-size: 16px; font-weight: 800;
          padding: 0 28px; white-space: nowrap; cursor: pointer;
          transition: background 0.15s ease, transform 0.1s ease;
        }
        .enterButton:hover { background: #2a2a2a; }
        .enterButton:active { transform: scale(0.97); }
        .logout {
          background: none; border: 0; padding: 0; font: inherit;
          color: #202020; font-size: 16px; font-weight: 700; cursor: pointer;
          transition: opacity 0.15s ease;
        }
        .logout:hover { opacity: 0.6; text-decoration: underline; }

        /* \uD584\uBC84\uAC70 */
        .hamburger {
          margin-left: auto;
          width: 44px; height: 44px;
          background: none; border: 0; padding: 0; cursor: pointer;
          display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        }
        .hamburger span { display: block; width: 26px; height: 2px; background: #111; border-radius: 2px; }

        /* \uD0A4\uBCF4\uB4DC \uD3EC\uCEE4\uC2A4 \uB9C1 \u2014 \uB9C8\uC6B0\uC2A4 \uD074\uB9AD \uC2DC \uC548 \uB728\uACE0 Tab \uD0D0\uC0C9 \uC2DC\uC5D0\uB9CC \uD45C\uC2DC (WCAG 2.1 AA) */
        /* outline \uC0AC\uC6A9\uC73C\uB85C \uB808\uC774\uC544\uC6C3 \uBC00\uB9BC \uC5C6\uC74C. \uBE0C\uB79C\uB4DC \uC624\uB80C\uC9C0 #FF6427 */
        .logo:focus-visible,
        .navLink:focus-visible,
        .enterButton:focus-visible,
        .logout:focus-visible,
        .hamburger:focus-visible,
        .closeBtn:focus-visible {
          outline: 2.5px solid #FF6427;
          outline-offset: 4px;
          border-radius: 6px;
        }
        /* pill \uBC84\uD2BC\uC740 \uB77C\uC6B4\uB4DC\uC5D0 \uB9DE\uCDB0 \uB9C1\uB3C4 \uB465\uAE00\uAC8C */
        .enterButton:focus-visible { border-radius: 999px; }
        /* \uB9C8\uC6B0\uC2A4 \uD074\uB9AD \uC2DC \uC794\uB958 outline \uC81C\uAC70(focus-visible \uBBF8\uC9C0\uC6D0 \uD3F4\uBC31) */
        .navLink:focus:not(:focus-visible),
        .enterButton:focus:not(:focus-visible),
        .logout:focus:not(:focus-visible),
        .hamburger:focus:not(:focus-visible),
        .closeBtn:focus:not(:focus-visible),
        .logo:focus:not(:focus-visible) { outline: none; }

        /* \uB4DC\uB85C\uC5B4 + \uC624\uBC84\uB808\uC774 */
        .overlay {
          position: fixed; inset: 0; background: rgba(0,0,0,0.45);
          opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 50;
        }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .drawer {
          position: fixed; top: 0; right: 0; height: 100%;
          width: min(300px, 82vw); background: #fff; z-index: 60;
          transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
          box-shadow: -8px 0 24px rgba(0,0,0,0.12);
          display: flex; flex-direction: column; padding: 20px 24px 28px;
        }
        .drawer.open { transform: translateX(0); }
        .closeBtn {
          align-self: flex-end; width: 40px; height: 40px; border: 0; background: none;
          font-size: 24px; color: #111; cursor: pointer; line-height: 1;
        }
        .drawerNav { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
        .drawerNav .navLink {
          text-align: left; padding: 16px 4px; font-size: 18px; font-weight: 700;
          color: #111; border-bottom: 1px solid #f0f0f0;
        }
        .drawerActions { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
        .drawerActions .enterButton { width: 100%; height: 52px; }
        .drawerActions .logout { align-self: center; padding: 8px; font-size: 15px; }

        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap');

        .frame { position: relative; z-index: 2; width: 100%; height: auto; display: block; }    /* \uD504\uB808\uC784: \uC704 \uB808\uC774\uC5B4(\uD22C\uBA85 \uAD6C\uBA4D\uC73C\uB85C \uD654\uBA74 \uBE44\uCE68) */

        .leadSub2 { font-weight: 400; font-size: 24px; line-height: normal; color: #5D5D5D; }

        .pr, .pr *, .pr-ov, .pr-ov * { box-sizing: border-box; }
        .pr {
          width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff;
          padding: 56px 20px 80px; font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif; color: #1a1a1a;
        }
        .pr-wrap { max-width: 1080px; margin: 0 auto; }
        .pr-head { text-align: center; margin-bottom: 48px; }
        .pr-head h2 { margin: 0; font-size: clamp(28px, 4vw, 42px); font-weight: 700; line-height: 54px; color: #1C1C1C; }
        .pr-head p { margin: 10px 0 0; color: #484848; font-size: 28px; font-weight: 400; line-height: 40px; }

        /* tabs */
        .pr-tabs { display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; margin: 0 auto 40px; max-width: 1080px; }
        .pr-tab {
          appearance: none; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap;
          flex: 0 0 auto; width: 160px; height: 56px; padding: 0; min-width: 0;
          border: 1px solid #5D5D5D; background: transparent; color: #010205; border-radius: 50px;
          font-family: inherit; font-size: 18px; font-weight: 400; letter-spacing: -0.02em; line-height: 1; cursor: pointer; transition: all 0.15s ease;
        }
        .pr-tab:hover { background: rgba(28,28,28,0.04); }
        .pr-tab:focus-visible { outline: 3px solid rgba(230,84,27,0.45); outline-offset: 2px; }
        .pr-tab[aria-selected="true"] { background: #1C1C1C; color: #FFFFFF; border-color: #5D5D5D; }

        /* panel */
        .pr-panel { display: grid; grid-template-columns: 1fr 1.15fr; gap: 40px; align-items: center; padding: 0 44px; }
        .pr-info, .pr-stagewrap { min-width: 0; }
        .pr-info h3 { margin: 0; font-size: 30px; font-weight: 700; line-height: 40px; letter-spacing: -0.02em; color: #1C1C1C; }
        .pr-info .lead { margin: 6px 0 0; font-size: 30px; font-weight: 500; line-height: 40px; letter-spacing: -0.02em; color: #5D5D5D; }
        .pr-info hr { border: 0; border-top: 1px solid #e7e7e7; width: 400px; max-width: 100%; margin: 30px 0; }
        .pr-feat { list-style: none; margin: 0; padding: 0; }
        .pr-feat li { display: flex; gap: 8px; align-items: flex-start; color: #5D5D5D; font-size: 26px; font-weight: 300; line-height: 43px; }
        .pr-feat li::before { content: "\u2713"; color: #5D5D5D; font-weight: 300; }
        .pr-note { display: flex; gap: 7px; margin: 36px 0 0; color: #929292; font-size: 15px; font-weight: 500; line-height: 1.5; letter-spacing: -0.3px; }
        .pr-note::before { content: "\u2022"; }

        /* \uC378\uB124\uC77C(\uD638\uBC84 \uD0C0\uAE43) */
        .pr-stagewrap { position: relative; }
        .pr-thumb {
          position: relative; display: block; width: 100%; margin: 0; padding: 0; border: 0; background: transparent; cursor: pointer;
          border-radius: 16px; transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease;
        }
        .pr-thumb:hover, .pr-thumb:focus-visible { transform: translateY(-5px); box-shadow: 0 20px 44px rgba(0,0,0,0.16); }
        .pr-thumb:focus-visible { outline: 3px solid rgba(241,99,42,0.6); outline-offset: 4px; }
        .pr-thumbbox { position: relative; width: 100%; aspect-ratio: 628 / 410; border-radius: 16px; overflow: hidden; background: #fff; }
        .pr-thumbimg { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
        .pr-badge {
          position: absolute; top: 14px; left: 14px; z-index: 3; background: rgba(230,84,27,0.85); color: #fff;
          width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; text-align: center; font-size: 12px; font-weight: 700; line-height: 1.2;
        }

        /* \uD654\uBA74\uC911\uC559 \uC624\uBC84\uB808\uC774 \u2014 \uB370\uC2A4\uD06C\uD0D1\uC740 pointer-events:none(\uD638\uBC84 \uC720\uC9C0), \uBAA8\uBC14\uC77C\uC740 \uD0ED\uC73C\uB85C \uB2EB\uAE30 */
        .pr-ov { position: fixed; inset: 0; z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 4vh 4vw; background: rgba(15,18,24,0); opacity: 0; pointer-events: none; transition: opacity .3s ease, background .3s ease; }
        .pr-ov.on { opacity: 1; background: rgba(15,18,24,.55); }
        .pr-ov.on.mob { pointer-events: auto; }
        .pr-ovinner { transform: scale(.9); opacity: 0; perspective: 2800px; transition: opacity .32s ease, transform .34s cubic-bezier(.2,.7,.2,1); display: flex; align-items: center; justify-content: center; }
        .pr-ov.on .pr-ovinner { transform: scale(1); opacity: 1; }
        .pr-ovinner.words { width: clamp(300px, 56vw, 600px); }
        .pr-ovinner.book { width: clamp(320px, 74vw, 920px); }
        .pr.reduce .pr-ov { transition: opacity .2s ease; }

        .pr-ovimg { display: block; max-height: 86vh; max-width: 88vw; width: auto; border-radius: 6px; box-shadow: 0 30px 60px rgba(0,0,0,.4); background: #fff; }

        /* \uB9AC\uD3EC\uD2B8 \uD50C\uB9BD */
        .pr-flipv { perspective: 2600px; }
        .pr-flipv-in { position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
        .pr-flipv-in.back { transform: rotateY(180deg); }
        .pr-flipv-face { display: block; max-height: 84vh; max-width: 86vw; width: auto; border-radius: 5px; box-shadow: 0 24px 60px rgba(0,0,0,.45); background: #fff; backface-visibility: hidden; }
        .pr-flipv-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); object-fit: contain; }

        /* \uCC45(\uB370\uC2A4\uD06C\uD0D1): \uD3BC\uCE5C \uCC45 \u2014 \uC624\uB978\uCABD \uD398\uC774\uC9C0\uB9CC \uCC45\uB4F1\uC5D0\uC11C \uB118\uAE40 */
        .pr-bk { width: 100%; display: flex; align-items: center; justify-content: center; perspective: 2600px; animation: prFade .4s ease; }
        @keyframes prFade { from { opacity: 0; } to { opacity: 1; } }
        .pr.reduce .pr-bk { animation: none; }
        .pr-bk-cover { display: block; max-height: 82vh; max-width: 100%; width: auto; border-radius: 5px; background: #fff; box-shadow: 4px 4px 0 -1px #e8e8e8, 8px 8px 0 -2px #d6d6d6, 0 24px 60px rgba(0,0,0,.45); }
        .pr-book { position: relative; width: 100%; }
        .pr-spr { position: absolute; inset: 0; display: flex; transform-style: preserve-3d; box-shadow: 0 30px 60px rgba(0,0,0,.34); border-radius: 4px; background: #fffdf7; }
        .pr-hf { position: relative; width: 50%; height: 100%; overflow: hidden; background: #fffdf7; }
        .pr-hf.left { border-radius: 6px 0 0 6px; } .pr-hf.right { border-radius: 0 6px 6px 0; }
        .pr-hf.left::after, .pr-hf.right::before { content: ""; position: absolute; top: 0; bottom: 0; width: 12%; pointer-events: none; z-index: 3; }

@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable-dynamic-subset.css');
@import url('https://fonts.googleapis.com/css2?family=Koulen&display=swap');
@keyframes sf-fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
@keyframes sf-shine { from { background-position: 200% 0; } to { background-position: -200% 0; } }
.sf-section {
  position: relative;
  width: 100%;
  background: #FFFFFF;
  color: #1A1A1A;
  box-sizing: border-box;
  font-family: "Pretendard Variable","Pretendard",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo",sans-serif;
  -webkit-font-smoothing: antialiased;
  padding: clamp(72px, 9vw, 120px) clamp(16px, 4vw, 40px);
  overflow: hidden;
}
.sf-inner {
  max-width: 1200px;
  margin: 0 auto;
  opacity: 0;
  transform: translateY(22px);
  transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1);
}
.sf-inner.is-visible { opacity: 1; transform: none; }
/* \u2500\u2500 \uD5E4\uB354 \u2500\u2500 */
.sf-head {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  height: clamp(96px, 12vw, 150px);
  margin-bottom: clamp(28px, 4vw, 44px);
}
.sf-watermark {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -54%);
  font-family: "Koulen", sans-serif;
  font-size: clamp(72px, 17vw, 210px);
  line-height: 1;
  letter-spacing: -0.024em;  /* Figma \uC790\uAC04 -5px */
  color: rgba(0,0,0,0.02);
  white-space: nowrap;
  user-select: none;
  pointer-events: none;
  z-index: 0;
}
.sf-heading {
  position: relative;
  z-index: 1;
  margin: 0;
  font-weight: 700;
  font-size: clamp(24px, 4.4vw, 42px);
  letter-spacing: -1px;
  color: #000000;
  text-align: center;
}
/* \u2500\u2500 \uCE74\uB4DC \uADF8\uB9AC\uB4DC \u2500\u2500 */
.sf-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: clamp(14px, 2vw, 26px);
}
.sf-card {
  position: relative;
  display: block;
  text-decoration: none;
  color: inherit;
  cursor: pointer;
  aspect-ratio: 280 / 353;
  container-type: inline-size;
  opacity: 0;
  animation: sf-fadeUp .7s cubic-bezier(.22,1,.36,1) forwards;
}
.sf-card:focus-visible { outline: 3px solid #E6541B; outline-offset: 4px; border-radius: 12px; }
/* \uD328\uB110 \u2014 \uD45C\uC9C0\uB97C \uBE14\uB7EC\uD55C \uC570\uBE44\uC5B8\uD2B8 \uC0C9\uBA74(\uBC00\uB9AC\uC2DD), \uB77C\uC6B4\uB4DC 20 */
.sf-thumb {
  position: absolute;
  left: 0;
  top: 4.25%;            /* 15 / 353 */
  width: 100%;
  height: 95.75%;        /* 338 / 353 */
  border-radius: 7.1cqw; /* 20 / 280 */
  overflow: hidden;
  background: #FFFFFF;   /* \uC6CC\uC2DC \uBCA0\uC774\uC2A4(\uC21C\uBC31 \u2014 \uC7BF\uBE5B \uBC29\uC9C0) */
  transition: transform .35s cubic-bezier(.22,1,.36,1);
}
/* \uCC44\uC6B0\uAE30: \uD45C\uC9C0\uB97C \uAC15\uD558\uAC8C \uBE14\uB7EC\uD55C \uB9E4\uB048\uD55C \uC570\uBE44\uC5B8\uD2B8 \uC0C9\uBA74 (\uBC00\uB9AC\uC758\uC11C\uC7AC onePick \uC2A4\uD0C0\uC77C) */
.sf-thumb-bg {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  transform: scale(1.1);
  filter: blur(26px) saturate(1.05);
  opacity: 0.9;
  z-index: 0;
}
.sf-card:hover .sf-thumb { transform: translateY(-4px); }
/* \uC120\uBA85\uD55C \uD45C\uC9C0 */
.sf-cover {
  position: absolute;
  top: 0;
  left: 17.86%;          /* 50 / 280 */
  width: 64.29%;         /* 180 / 280 */
  aspect-ratio: 180 / 219;
  object-fit: cover;
  border-radius: 3.57cqw;/* 10 / 280 */
  z-index: 2;
  box-shadow: -14px 12px 7px 0 rgba(0,0,0,0.09);
  transition: transform .5s cubic-bezier(.22,1,.36,1);
}
.sf-card:hover .sf-cover { transform: translateY(-3px) scale(1.02); }
/* \uD14D\uC2A4\uD2B8 (\uC88C\uCE21 \uC815\uB82C, Figma \uC88C\uD45C) */
.sf-text {
  position: absolute;
  left: 0;
  top: 70.5%;            /* 249 / 353 */
  width: 100%;
  padding: 0 6%;
  box-sizing: border-box;
  z-index: 2;
  text-align: center;    /* \uCC45\uC81C\uBAA9\xB7\uC791\uAC00\uBA85 \uAC00\uC6B4\uB370 \uC815\uB82C */
}
.sf-title {
  margin: 0 0 0.4em;
  font-weight: 700;
  font-size: 7.4cqw;     /* \uCC45\uC81C\uBAA9 \uCD95\uC18C (~20.7px @280) */
  line-height: 1.2;
  letter-spacing: -0.01em;
  color: #1A1A1A;
  display: -webkit-box;
  -webkit-box-orient: vertical;
  -webkit-line-clamp: 2;
  overflow: hidden;
}
.sf-author {
  margin: 0;
  font-weight: 400;
  font-size: 5cqw;       /* 14 / 280 */
  line-height: 1.2;
  color: #4B5563;        /* rgb(75,85,99) */
}
/* \u2500\u2500 \uBC84\uD2BC: \uD22C\uBA85 + 1px \uB2E4\uD06C \uC678\uACFD\uC120 pill \u2500\u2500 */
.sf-btn-wrap { margin-top: clamp(36px, 4.5vw, 56px); text-align: center; }
.sf-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 56px;
  padding: 14px 70px;
  border-radius: 999px;
  border: 1px solid #010205;
  background: transparent;
  color: #010205;
  font-size: 20px;
  font-weight: 400;
  letter-spacing: -0.02em;
  text-decoration: none;
  transition: background .2s ease, color .2s ease, transform .2s ease;
}
.sf-btn:hover { background: #010205; color: #FFFFFF; transform: translateY(-2px); }
.sf-btn:focus-visible { outline: 3px solid #E6541B; outline-offset: 3px; }
/* \u2500\u2500 \uB85C\uB529 \uC2A4\uCF08\uB808\uD1A4 \u2500\u2500 */
.sf-skel .sf-thumb { background: #F1F2F4; }
.sf-skel .sf-cover {
  background: linear-gradient(100deg, #e7e9ec 30%, #f2f3f5 50%, #e7e9ec 70%);
  background-size: 200% 100%;
  animation: sf-shine 1.3s linear infinite;
  box-shadow: none;
}
.sf-skel .sf-line { height: 7cqw; border-radius: 4px; background: #ECEDEF; }
.sf-skel .sf-line + .sf-line { margin-top: 4cqw; height: 5cqw; width: 55%; }
/* \u2500\u2500 \uBC18\uC751\uD615 (\xA75: @media \uBBF8\uC0AC\uC6A9 \u2192 JS .sf-narrow/.sf-mob/.sf-reduce \uD074\uB798\uC2A4 \uD1A0\uAE00) \u2500\u2500 */
.sf-narrow .sf-grid { grid-template-columns: repeat(2, 1fr); gap: clamp(14px, 3vw, 22px); }
.sf-mob .sf-btn { width: 100%; padding: 14px 24px; }
.sf-reduce .sf-card, .sf-reduce .sf-inner { animation: none !important; opacity: 1 !important; transform: none !important; }
.sf-reduce .sf-skel .sf-cover { animation: none !important; }  /* \uC2A4\uCF08\uB808\uD1A4 shimmer\uB3C4 \uC815\uC9C0 */
/* \u2500\u2500 \uBE48/\uC5D0\uB7EC \uC0C1\uD0DC \u2500\u2500 */
.sf-state { grid-column: 1 / -1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 14px; padding: clamp(40px, 7vw, 72px) 16px; text-align: center; }
.sf-state p { margin: 0; font-size: clamp(15px, 2.2vw, 18px); color: #4B5563; line-height: 1.5; }
.sf-retry {
  display: inline-flex; align-items: center; min-height: 44px; padding: 11px 26px;
  border-radius: 999px; border: 1px solid #010205; background: transparent; color: #010205;
  font-size: 15px; font-weight: 500; cursor: pointer;
  transition: background .2s ease, color .2s ease;
}
.sf-retry:hover { background: #010205; color: #FFFFFF; }
.sf-retry:focus-visible { outline: 3px solid #E6541B; outline-offset: 3px; }
