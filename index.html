<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>참빛북클럽 — 맥그로힐 원더스 기반 빅데이터 영어 독서</title>
<meta name="description" content="미국 국공립 초등 읽기 교재 맥그로힐 원더스(Wonders)와 빅데이터 기반 영어 독서 서비스. 14일 무료 체험으로 시작하세요." />
<meta property="og:title" content="참빛북클럽 — 맥그로힐로 시작하는 영어 독서" />
<meta property="og:description" content="14일 무료 체험으로 시작하는 빅데이터 기반 영어 독서 서비스" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
    background: #ffffff; color: #111;
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
  }
  #root { width: 100%; overflow-x: hidden; }

  /* 스크롤 등장 애니메이션 — JS 미실행 시 .armed 미부여로 항상 표시(§5 정적 폴백) */
  .reveal { transition: opacity .6s cubic-bezier(.22,.61,.36,1), transform .6s cubic-bezier(.22,.61,.36,1); }
  .reveal.armed { opacity: 0; }
  .reveal.armed.tf { transform: translateY(40px); will-change: opacity, transform; }
  .reveal.in { opacity: 1 !important; transform: none !important; }

  /* 카카오톡 1:1 상담 플로팅 버튼 — PNG 원본 형태 그대로 유지(원형 마스크/사각 그림자 제거) */
  .kakaoFloat {
    position: fixed; right: 22px; bottom: 22px; z-index: 9999;
    width: 84px; height: 84px; display: block;
    animation: kfloat 2.8s ease-in-out infinite;
    transition: transform .15s ease, filter .15s ease;
  }
  .kakaoFloat img {
    width: 100%; height: 100%; object-fit: contain; display: block;
    filter: drop-shadow(0 5px 12px rgba(0,0,0,0.30));
  }
  .kakaoFloat:hover { transform: translateY(-4px) scale(1.05); }
  .kakaoFloat:hover img { filter: drop-shadow(0 8px 16px rgba(0,0,0,0.32)); }
  .kakaoFloat:active { transform: scale(0.96); }
  .kakaoFloat:focus-visible { outline: 3px solid #FF6427; outline-offset: 3px; border-radius: 8px; }
  @keyframes kfloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @media (prefers-reduced-motion: reduce) { .kakaoFloat { animation: none; } .reveal { transition: none; } }

  .nojs-fallback {
    display: none; padding: 40px 20px; text-align: center;
    font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif; color: #333; line-height: 1.7;
  }
  .nojs-fallback a {
    display: inline-block; margin-top: 16px; padding: 14px 28px;
    background: #FF6427; color: #fff; border-radius: 70px; font-weight: 700; text-decoration: none;
  }
</style>
</head>
<body>
<div id="root"></div>

<a class="kakaoFloat" href="https://pf.kakao.com/_bPJub/chat" target="_blank" rel="noopener noreferrer" aria-label="카카오톡 1:1 상담 바로가기">
  <img src="https://cdn.bookclubs.co.kr/chambit_main/talk.png" alt="카카오톡 상담" />
</a>

<noscript>
  <div class="nojs-fallback" style="display:block">
    <h1>맥그로힐로 시작하는 참빛북클럽</h1>

  </div>
</noscript>

        * { box-sizing: border-box; }

        .header {
          width: 100vw;
          max-width: 100%;
          overflow-x: hidden;
          background: #ffffff;
          display: flex;
          justify-content: center;            /* \uC13C\uD130 \uC815\uB82C \uC720\uC9C0 */
          font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
        }
        .headerInner {
          width: 100%;
          max-width: 1200px;                  /* \uC13C\uD130\uAC12 \uC720\uC9C0 */
          padding: 0 24px;
          display: flex;
          align-items: center;
        }

        .logo {
          height: auto;
          display: block;
          flex-shrink: 0;
          cursor: pointer;
        }

        .nav {
          display: flex;
          align-items: center;
          font-size: 16px;
          line-height: 24px;
          white-space: nowrap;
          flex-shrink: 0;
        }
        .navLink {
          background: none; border: 0; padding: 0; font: inherit;
          cursor: pointer; text-decoration: none; transition: color 0.15s ease;
        }
        .navHome { color: #111111; font-weight: 800; }
        .navItem { color: #999999; font-weight: 500; }
        .navItem:hover { color: #111111; }
        .navHome:hover { opacity: 0.7; }

        .actions {
          margin-left: auto;
          display: flex;
          align-items: center;
          gap: 26px;
          white-space: nowrap;
          flex-shrink: 0;          /* \uBC84\uD2BC \uC601\uC5ED\uC740 \uC808\uB300 \uC548 \uC904\uACE0 \uC548 \uBC00\uB9BC */
          padding-left: 24px;
        }
        .enterButton {
          display: inline-flex; align-items: center; justify-content: center;
          min-width: 171px; height: 50px; border: 0; border-radius: 999px;
          background: #050505; color: #ffffff; font-size: 16px; font-weight: 800;
          padding: 0 28px; white-space: nowrap; cursor: pointer;
          transition: background 0.15s ease, transform 0.1s ease;
        }
        .enterButton:hover { background: #2a2a2a; }
        .enterButton:active { transform: scale(0.97); }
        .logout {
          background: none; border: 0; padding: 0; font: inherit;
          color: #202020; font-size: 16px; font-weight: 700; cursor: pointer;
          transition: opacity 0.15s ease;
        }
        .logout:hover { opacity: 0.6; text-decoration: underline; }

        /* \uD584\uBC84\uAC70 */
        .hamburger {
          width: 44px; height: 44px;
          background: none; border: 0; padding: 0; cursor: pointer;
          display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        }
        .hamburger span { display: block; width: 26px; height: 2px; background: #111; border-radius: 2px; }

        /* \uBAA8\uBC14\uC77C \uC6B0\uCE21 \uC544\uC774\uCF58 \uBC84\uD2BC(\uB85C\uADF8\uC544\uC6C3) + \uBE44\uB85C\uADF8\uC778 \uC2DC \uC815\uB82C\uC6A9 \uC2A4\uD398\uC774\uC11C */
        .iconBtn {
          width: 44px; height: 44px; flex-shrink: 0;
          background: none; border: 0; padding: 0; cursor: pointer; color: #111;
          display: inline-flex; align-items: center; justify-content: center;
          transition: opacity 0.15s ease;
        }
        .iconBtn:hover { opacity: 0.6; }
        .iconBtn:active { transform: scale(0.94); }
        .hdrSpacer { width: 44px; height: 44px; flex-shrink: 0; }

        /* \uD0A4\uBCF4\uB4DC \uD3EC\uCEE4\uC2A4 \uB9C1 \u2014 \uB9C8\uC6B0\uC2A4 \uD074\uB9AD \uC2DC \uC548 \uB728\uACE0 Tab \uD0D0\uC0C9 \uC2DC\uC5D0\uB9CC \uD45C\uC2DC (WCAG 2.1 AA) */
        /* outline \uC0AC\uC6A9\uC73C\uB85C \uB808\uC774\uC544\uC6C3 \uBC00\uB9BC \uC5C6\uC74C. \uBE0C\uB79C\uB4DC \uC624\uB80C\uC9C0 #FF6427 */
        .logo:focus-visible,
        .navLink:focus-visible,
        .enterButton:focus-visible,
        .logout:focus-visible,
        .iconBtn:focus-visible,
        .hamburger:focus-visible,
        .closeBtn:focus-visible {
          outline: 2.5px solid #FF6427;
          outline-offset: 4px;
          border-radius: 6px;
        }
        /* pill \uBC84\uD2BC\uC740 \uB77C\uC6B4\uB4DC\uC5D0 \uB9DE\uCDB0 \uB9C1\uB3C4 \uB465\uAE00\uAC8C */
        .enterButton:focus-visible { border-radius: 999px; }
        /* \uB9C8\uC6B0\uC2A4 \uD074\uB9AD \uC2DC \uC794\uB958 outline \uC81C\uAC70(focus-visible \uBBF8\uC9C0\uC6D0 \uD3F4\uBC31) */
        .navLink:focus:not(:focus-visible),
        .enterButton:focus:not(:focus-visible),
        .logout:focus:not(:focus-visible),
        .hamburger:focus:not(:focus-visible),
        .closeBtn:focus:not(:focus-visible),
        .logo:focus:not(:focus-visible) { outline: none; }

        /* \uB4DC\uB85C\uC5B4 + \uC624\uBC84\uB808\uC774 */
        .overlay {
          position: fixed; inset: 0; background: rgba(0,0,0,0.45);
          opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 50;
        }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .drawer {
          position: fixed; top: 0; left: 0; height: 100%;
          width: min(300px, 82vw); background: #fff; z-index: 60;
          transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
          box-shadow: 8px 0 24px rgba(0,0,0,0.12);
          display: flex; flex-direction: column; padding: 20px 24px 28px;
        }
        .drawer.open { transform: translateX(0); }
        .closeBtn {
          align-self: flex-end; width: 40px; height: 40px; border: 0; background: none;
          font-size: 24px; color: #111; cursor: pointer; line-height: 1;
        }
        .drawerNav { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
        .drawerNav .navLink {
          text-align: left; padding: 16px 4px; font-size: 18px; font-weight: 700;
          color: #111; border-bottom: 1px solid #f0f0f0;
        }
        .drawerActions { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
        .drawerActions .enterButton { width: 100%; height: 52px; }

        * { box-sizing: border-box; }

        .heroSection {
          position: relative;
          width: 100vw;
          max-width: 100%;
          overflow-x: hidden;
          background: #ffffff;
          padding: 28px 0;
          font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
        }
        .heroSection:focus-visible {
          outline: 3px solid #FF6427;
          outline-offset: -3px;
        }

        /* \uC774\uBBF8\uC9C0 \uBC30\uB108: \uB85C\uB529 \uC2A4\uCF08\uB808\uD1A4(\uC815\uC801 \uD50C\uB808\uC774\uC2A4\uD640\uB354) + \uC5D0\uB7EC \uD3F4\uBC31 */
        .slide.isImage { background: #ece9fb; }
        .imgFallback {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0 8%;
          text-align: center;
          background: linear-gradient(135deg, #ece9fb, #ded8f7);
          color: #6b6480;
          font-weight: 600;
          font-size: clamp(13px, 1.4vw, 16px);
          line-height: 1.5;
        }

        .track {
          display: flex;
          align-items: center;
          will-change: transform;
        }

        .slide {
          flex: 0 0 auto;
          width: min(1280px, 86vw);      /* CSS\uB85C \uD06C\uAE30 \uACB0\uC815 \u2192 Figma Make\uAC00 \uB9AC\uD50C\uB85C\uC6B0 \uCD94\uC801 */
          aspect-ratio: 1280 / 652;      /* JS \uBBF8\uC2E4\uD589(\uC815\uC801 \uCE94\uBC84\uC2A4) \uB300\uBE44 fallback (Figma \uBC30\uB108 \uD06C\uAE30) */
          border-radius: 50px;           /* Figma \uBAA8\uC11C\uB9AC \uBC18\uACBD */
          overflow: hidden;
          transform: translateZ(0);      /* \uD2B8\uB79C\uC2A4\uD3FC \uC870\uC0C1\uC5D0\uB3C4 \uB77C\uC6B4\uB529 \uD074\uB9AC\uD551 \uBCF4\uC7A5(\uBAA8\uC11C\uB9AC \uB0A8\uAE40 \uBC29\uC9C0) */
          cursor: pointer;
          transition: opacity 0.4s ease;
        }
        /* JS\uAC00 \uCE21\uC815\uD55C px \uB192\uC774\uAC00 \uC788\uC73C\uBA74 \uADF8 \uAC12\uC774 \uC6B0\uC120 \u2192 aspect-ratio \uC720\uB839 \uB192\uC774 \uC608\uC57D \uBC29\uC9C0 */
        .slide[data-h] { aspect-ratio: auto; }
        .slide.inactive { opacity: 0.55; }

        .slide.isImage img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
          border-radius: inherit; /* \uBAA8\uC11C\uB9AC \uB0A8\uAE40 \uBC29\uC9C0 */
        }
        .textBanner { border-radius: inherit; }
        .slide > a { display: block; height: 100%; border-radius: inherit; overflow: hidden; }

        /* 1) \uD14D\uC2A4\uD2B8 \uAE30\uBCF8 \uBC30\uB108 \u2014 \uBC30\uACBD(main_bg) + \uC6C0\uC9C1\uC774\uB294 \uCE90\uB9AD\uD130(main_img.gif, \uC808\uB300\uBC30\uCE58) */
        .textBanner {
          position: relative;
          width: 100%;
          height: 100%;
          background-color: #8C7AF0; /* \uD3F4\uBC31/\uC5EC\uBC31 \uCEEC\uB7EC */
          background-image: url(${b});
          background-repeat: no-repeat;
          background-position: center;
          background-size: cover;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: clamp(20px, 3vw, 44px);
          padding: 0 9%;
        }
        /* \uCE90\uB9AD\uD130 GIF \u2014 Figma \uC88C\uD45C(\uBC30\uB108 1280\xD7652 \uAE30\uC900, \uD3ED \uBE44\uB840) */
        .slide img.heroChars {
          position: absolute;
          left: 32.81%;   /* 420 / 1280 */
          top: 15.03%;    /* 98 / 652 */
          width: 82.97%;  /* 1062 / 1280 */

          object-fit: contain;
          z-index: 1;
          pointer-events: none;
          user-select: none;

        /* \uD14D\uC2A4\uD2B8\uB294 GIF \uC704\uB85C */

          letter-spacing: 0;

          margin: 0;

        .heroSub {

        .ctaPrimary svg { display: block; }

        .tab .slide img.heroChars { left: auto; right: 0; top: auto; bottom: 0; width: 52%; }
        .tab .textBanner > h1,
        .tab .textBanner > p,
        .tab .textBanner > .heroCta { max-width: 56%; }

        /* \uBAA8\uBC14\uC77C (JS\uB85C .mob \uD074\uB798\uC2A4 \uBD80\uC5EC \u2014 Figma Make\uC5D0\uC11C @media \uBBF8\uC791\uB3D9 \uB300\uC751) */
        .heroSection.mob { padding: 8px 0; }

        .mob .slide { border-radius: 20px; width: min(1280px, 94vw); aspect-ratio: 368 / 380; }
        .mob .textBanner {
          gap: 16px;
          padding: 0 8%;
          background-position: center;
          background-size: cover;
        }
        /* \uCE90\uB9AD\uD130: Figma \uBAA8\uBC14\uC77C \uC88C\uD45C \uAE30\uC900 (\uBC30\uB108 390 \uAE30\uC900 left 31% top 47% width 82%) */

          color: #010205; padding-left: 0; min-height: 44px;

    * { box-sizing: border-box; }
    .statsSection { width:100vw; max-width:100%; overflow-x:hidden; background:#fff; display:flex; justify-content:center; padding:72px 24px; font-family:"Pretendard","Apple SD Gothic Neo",Arial,sans-serif; }
    .statsSection.mob { padding:16px 18px; }

    .stageWrap { position:relative; }
    .stage { position:absolute; top:0; left:0; width:${h}px; height:${x}px; transform-origin:top left; }
    .stage > * { position:absolute; }

    .heading { left:31px; top:0; margin:0; white-space:nowrap; font-weight:700; font-size:28px; line-height:36px;
      background:${Z0}; background-size:220% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
      opacity:0; transform:translateY(14px); transition:opacity .7s ease, transform .7s ease; }
    .in .heading { opacity:1; transform:none; animation:flow 5s ease-in-out 1s infinite; }

    .stat { display:flex; flex-direction:column; gap:13px; top:5px; }
    .statLabel { font-size:14px; font-weight:500; color:#3B3B3B; letter-spacing:-0.26px; white-space:nowrap; }
    .statValue { font-size:32px; font-weight:700; color:#3B3B3B; letter-spacing:-0.64px; white-space:nowrap; display:inline-flex; align-items:center; }
    .statValue .pct { font-size:21px; }

    .awards { left:54px; top:108px; width:392px; height:auto; display:block;
      filter:drop-shadow(0 11px 14px rgba(0,0,0,0.10));
      opacity:0; transform:translateY(18px) scale(.97); transition:opacity .7s ease .15s, transform .7s ease .15s; }
    .in .awards { opacity:1; transform:none; }

    .graph { left:0px; top:51px; width:1213px; height:396px; }
    .graph svg { width:1213px; height:396px; overflow:visible; }
    .curve { fill:none; stroke:url(#curveGrad); stroke-width:6; stroke-linecap:round;
      stroke-dasharray:1; stroke-dashoffset:1; will-change:stroke-dashoffset;
      transition:stroke-dashoffset 1.7s cubic-bezier(.33,0,.2,1) .1s; }
    .in .curve { stroke-dashoffset:0; }
    .dline { opacity:0; transition:opacity .7s ease; }
    .in .dline { opacity:1; }
    .dline line { stroke:#D8D8D8; stroke-width:1.5; stroke-dasharray:4 5; }
    .dline path { stroke:#D8D8D8; stroke-width:1.6; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .pt { opacity:0; transform:scale(0); transform-box:fill-box; transform-origin:center; will-change:transform,opacity;
      transition:transform .6s cubic-bezier(.34,1.56,.64,1), opacity .4s ease; }
    .in .pt { opacity:1; transform:scale(1); }

    .anno { opacity:0; transform:translateY(14px); will-change:transform,opacity; transition:opacity .8s cubic-bezier(.22,.61,.36,1), transform .8s cubic-bezier(.22,.61,.36,1); }
    .in .anno { opacity:1; transform:none; }
    .list { list-style:none; margin:0; padding:0; }
    .list li { font-size:12px; font-weight:300; color:#929292; line-height:15px; letter-spacing:-0.24px; white-space:nowrap; padding-left:11px; position:relative; }
    .list li::before { content:"\xB7"; position:absolute; left:2px; top:-1px; }
    /* \uADF8\uB798\uD504\uAC00 \uC62C\uB77C\uC624\uB294 \uB3D9\uC548 \uC904 \uB2E8\uC704\uB85C \uC8FC\uB974\uB975 \uB4F1\uC7A5 */
    .list.stagger li { opacity:0; transform:translateY(10px); will-change:opacity,transform;
      transition:opacity .7s cubic-bezier(.22,.61,.36,1), transform .7s cubic-bezier(.22,.61,.36,1); }
    .in .list.stagger li { opacity:1; transform:none; }

    .pillWrap { left:941px; top:146px; width:294px; height:117px; filter:drop-shadow(0 10px 8px rgba(232,105,55,0.22)); }
    .pillImg { display:block; width:294px; height:117px; }
    .pillText { left:951px; top:157px; width:273px; height:82px; display:flex; flex-direction:column; align-items:center; justify-content:center;
      color:#fff; font-weight:600; font-size:24px; line-height:26px; letter-spacing:-0.48px; text-align:center; }
    .cert { left:958px; top:278px; width:259px; text-align:center; }
    .cert .c1 { font-weight:700; font-size:18px; color:#e6541b; letter-spacing:-0.36px; line-height:19px; }
    .cert .c2 { font-weight:700; font-size:18px; color:#e6541b; letter-spacing:-0.36px; line-height:19px; margin-top:2px; }

    /* \uBAA8\uBC14\uC77C */
    .mInner { width:100%; max-width:460px; }
    .mHeading { margin:0 0 26px; font-weight:700; font-size:24px; line-height:1.4; color:#1C1C1C; }
    .mStats { display:flex; justify-content:space-between; gap:12px; margin-bottom:26px; }
    .mStat { display:flex; flex-direction:column; gap:8px; align-items:center; flex:1; }
    .mStat .statLabel { font-weight:300; font-size:12px; color:#5D5D5D; }
    .mStat .statValue { font-size:24px; font-weight:700; color:#1C1C1C; }
    .mStat .statValue .pct { font-size:16px; }
    .mAwards { width:78%; max-width:320px; height:auto; display:block; margin:0 auto 28px; filter:drop-shadow(0 8px 12px rgba(0,0,0,0.08)); }
    .mTimeline { display:flex; flex-direction:column; gap:14px; }
    .stCard { border:1px solid #E5E5E5; background:transparent; border-radius:14px; padding:12px 18px; opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease; }
    .in .stCard { opacity:1; transform:none; }
    .mPill { position:relative; width:100%; max-width:300px; margin:4px auto 0; }
    .mPillImg { display:block; width:100%; height:auto; }
    .mPillText { position:absolute; inset:0 0 6% 0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; color:#fff; font-weight:600; font-size:clamp(15px,4.4vw,20px); line-height:1.2; letter-spacing:-0.02em; text-align:center; }
    .mCert { text-align:center; }
    .mCert div { color:#E6541B; font-weight:700; font-size:14px; line-height:1.5; letter-spacing:-0.02em; }
    .mPill, .mCert { opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease; }
    .in .mPill, .in .mCert { opacity:1; transform:none; }
    .stCard .list li { font-size:14px; white-space:normal; line-height:1.5; padding-left:13px; }
    .stCard .list li::before { top:0; }

    /* \uBAA8\uBC14\uC77C \uC790\uB3D9 \uC2AC\uB77C\uC774\uB4DC \uCE90\uB7EC\uC140 */
    .mCarousel { width:100%; }
    .mViewport { overflow:hidden; transition:height .5s cubic-bezier(.4,0,.2,1); }
    .reduce .mViewport { transition:none; }
    .mTrack { display:flex; align-items:flex-start; transition:transform .5s cubic-bezier(.4,0,.2,1); }
    .reduce .mTrack { transition:none; }
    .mSlide { flex:0 0 100%; min-width:100%; padding:0 2px; }
    .mSlide .stCard { height:auto; }


    /* \u2500\u2500 \uC740\uC740\uD55C \uC0C1\uC2DC \uBAA8\uC158(\uC2DC\uC120 \uC720\uB3C4) \u2500\u2500 */
    /* \uD5E4\uB529 \uADF8\uB77C\uB370\uC774\uC158 \uC88C\uC6B0 \uD750\uB984 */
    @keyframes flow { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
    /* \uADF8\uB798\uD504 \uC810 ping(\uBC18\uC9DD) \u2014 \uB4F1\uC7A5 \uC644\uB8CC \uD6C4 \uD37C\uC9C0\uB294 \uB9C1 */
    .ping { transform-box:fill-box; transform-origin:center; opacity:0; }
    .in .ping { animation:ping 2.8s cubic-bezier(.2,.6,.3,1) infinite; }
    @keyframes ping { 0%{transform:scale(1);opacity:.55} 70%{opacity:0} 100%{transform:scale(3);opacity:0} }
    /* \uB9D0\uD48D\uC120 \uC228\uC26C\uB294 \uAE00\uB85C\uC6B0 */
    .in .pillWrap { animation:breathe 3.2s ease-in-out 3s infinite; }
    @keyframes breathe {
      0%,100%{ filter:drop-shadow(0 10px 8px rgba(232,105,55,0.22)); }
      50%{ filter:drop-shadow(0 12px 18px rgba(232,105,55,0.42)); }
    }

        /* \uD0DC\uBE14\uB9BF \u2014 absolute + left:50%/translateX \uB85C \uD655\uC2E4\uD788 \uC911\uC559 (Make \uD638\uD658) */
        .cbkTablet { position: absolute; left: 50%; top: 0; transform: translateX(-50%); z-index: 2; }

        .cbkSkeleton {
          position: absolute; inset: 0; border-radius: 20px;

        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&display=swap');
        .laSection, .laSection * { box-sizing: border-box; }
        .laSection {
          width: 100%; max-width: 100%; background: #fff; overflow-x: clip;
          font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
          color: #1b1b1b; padding: 64px 0;
          word-break: keep-all; line-break: strict; text-wrap: balance;   /* \uD55C\uAE00 \uC74C\uC808 \uC904\uBC14\uAFC8 \uBC29\uC9C0 */
          --la-ink: #1b1b1b; --la-sub: #878c91; --la-line: #e7e9ec; --la-card: #f5f6f8;
        }
        .laInner { width: 92%; max-width: 1180px; margin: 0 auto; }

        .laHead { text-align: center; margin-bottom: 44px; }
        .laTitle { font-weight: 700; font-size: clamp(26px,3.6vw,42px); line-height: 1.28; margin: 0 0 12px; }
        .laSub { font-weight: 400; font-size: clamp(16px,1.9vw,28px); color: #484848; line-height: 1.43; margin: 0; }

        /* ---------- Part A ---------- */
        .partA { display: grid; grid-template-columns: 1fr 1.1fr; gap: 32px; align-items: center; margin-bottom: 72px; }
        .ebookCard { display: flex; flex-direction: column; align-items: center; }
        .ebookTextBox { background: #FAFAFA; border: 1px solid #EFEFEF; border-radius: 20px; padding: 40px 48px; width: fit-content; max-width: 100%;
          margin: 0 auto 20px; text-align: center; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .ebookTitle { font-weight: 700; font-size: 26px; line-height: 40px; margin: 0; white-space: nowrap; }   /* \uD55C \uC904 \xB7 \uC774\uBBF8\uC9C02 */
        .ebookSub { font-weight: 400; font-size: 24px; line-height: 40px; color: #5D5D5D; margin: 0; white-space: nowrap; }   /* \uC774\uBBF8\uC9C03 */
        .ebookIconsBox { width: 100%; max-width: 579px; padding: 6px 0; }
        .ebookIcons { width: 100%; height: auto; display: block; }
        .ebookIconsFb { display: none; gap: 10px; }
        .ebookIconsFb span { flex: 1; text-align: center; font-size: 12px; color: var(--la-sub); }
        .sceneTab { width: 100%; height: auto; display: block; border-radius: 18px; }

        /* ---------- Part B : \uD0DC\uBE14\uB9BF(\uC808\uB300/\uACE0\uC815) + \uC6B0\uCE21 \uC2A4\uD15D ---------- */
        .partB { position: relative; }
        .stepsCol { width: 48%; margin-left: 52%; padding: 8vh 0 0; }
        .device { position: absolute; top: 0; left: 0; width: 100%; max-width: 560px; will-change: top, position; }
        .device.pinned { z-index: 4; }
        .screenArea { position: absolute; z-index: 1; overflow: hidden; }                       /* \uD654\uBA74: \uC544\uB798 \uB808\uC774\uC5B4 \u2014 \uD504\uB808\uC784 \uBCA0\uC824\uC774 \uB118\uCE68\uC744 \uC798\uB77C\uC90C */
        .frame { position: relative; z-index: 2; width: 100%; height: auto; display: block; }    /* \uD504\uB808\uC784: \uC704 \uB808\uC774\uC5B4(\uD22C\uBA85 \uAD6C\uBA4D\uC73C\uB85C \uD654\uBA74 \uBE44\uCE68) */
        .scr { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; opacity: 0; transition: opacity .5s ease; }
        .scr.on { opacity: 1; }

        /* \uB9AC\uB4DC(\uAC00\uC6B4\uB370) */
        .leadWrap { text-align: center; margin-bottom: 44px; }
        .lead { font-weight: 700; font-size: 26px; line-height: 40px; color: #1C1C1C; margin: 0; }
        .leadSub1 { font-weight: 600; font-size: 24px; line-height: 40px; color: #5D5D5D; margin: 0; }
        .leadBox { display: inline-flex; flex-direction: column; align-items: center; gap: 10px; max-width: 100%; margin: 0 auto; background: #FAFAFA; border: 1px solid #EFEFEF; border-radius: 20px; padding: 27px 32px; text-align: center; }
        .leadSub2 { font-weight: 400; font-size: 24px; line-height: normal; color: #5D5D5D; }

        .step { min-height: 56vh; display: flex; flex-direction: column; justify-content: center; }
        .step:last-child { min-height: 40vh; }   /* \uB9C8\uC9C0\uB9C9 \uC2A4\uD15D: 06 \uC911\uC559=\uD0DC\uBE14\uB9BF \uC911\uC559 \uC9C0\uC810\uC5D0\uC11C \uC139\uC158 \uC885\uB8CC(\uD2B8\uB808\uC77C\uB9C1\u22480) */
        .laSection.js .step { opacity: 0; transition: opacity .45s ease; }   /* \uBE44\uD65C\uC131 \uC228\uAE40 */
        .laSection.js .step.on { opacity: 1; }
        .laSection.reduce .step, .laSection.reduce .scr { transition: opacity .2s; }
        .area { display: inline-flex; align-items: center; gap: 9px; font-weight: 700; font-size: 26px; line-height: 30px; color: #6ACC8D; margin-bottom: 14px; }
        .dotG { width: 15px; height: 15px; border-radius: 999px; background: #6ACC8D; display: inline-block; }
        .num { font-family: "Plus Jakarta Sans", "Pretendard", sans-serif; font-weight: 600; font-size: 20px; line-height: 1.8; color: rgba(1,2,5,0.4); margin-bottom: 6px; font-variant-numeric: tabular-nums; }
        .num b { font-weight: 700; color: #010205; }
        /* \uD65C\uC131 \uC2A4\uD15D \uBC88\uD638 \uBC11\uC904 \u2014 \uBAA8\uBC14\uC77C(.mCard.on .mNum b)\uACFC \uB3D9\uC77C\uD558\uAC8C PC\uC5D0\uB3C4 \uC801\uC6A9 */
        .step.on .num b { text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 2px; }
        .en { font-weight: 700; font-size: 32px; line-height: 29px; color: #1C1C1C; margin: 0; }
        .ko { font-weight: 700; font-size: 25px; line-height: 38px; color: #1C1C1C; margin: 0 0 14px; }
        .desc { font-weight: 300; font-size: 25px; line-height: 29px; color: #7E7E7E; margin: 0; }

        /* ---------- \uBAA8\uBC14\uC77C (.mob JS \uD1A0\uAE00, @media \uBBF8\uC0AC\uC6A9) ---------- */
        .laSection.mob { padding: 40px 0; overflow-x: hidden; }
        .laSection.mob .laInner { width: 100%; }
        .mob .laHead { margin-bottom: 28px; padding: 0 16px; }
        .mob .laTitle { font-size: 24px; line-height: 1.3; }
        .mob .laSub { font-size: 16px; line-height: 1.5; font-weight: 400; color: #5D5D5D; }
        .mob .partA { grid-template-columns: 1fr; gap: 18px; margin-bottom: 44px; padding: 0 16px; }
        .mob .ebookTextBox { background: transparent; border: 0; padding: 0; gap: 6px; }
        .mob .stepsCol { width: 100%; margin-left: 0; }  /* padding-top/bottom\uC740 JS\uAC00 \uD0DC\uBE14\uB9BF \uB192\uC774\uB9CC\uD07C \uD655\uBCF4 */
        .mob .device { background: #fff; }  /* \uD22C\uBA85 PNG \uB4A4\uB85C \uC2A4\uD15D\uC774 \uBE44\uCE58\uB294 \uAC83 \uCC28\uB2E8 */
        .mob .leadWrap { margin: 0 0 22px; padding: 0 16px; }
        .mob .ebookTitle { font-size: 20px; font-weight: 700; line-height: 1.35; white-space: normal; color: #1C1C1C; }
        .mob .ebookSub { font-size: 18px; font-weight: 400; line-height: 1.5; white-space: normal; color: #5D5D5D; }
        .mob .lead { font-size: 20px; font-weight: 700; line-height: 1.4; color: #1C1C1C; }
        .mob .leadSub1 { font-size: 18px; font-weight: 600; line-height: 1.5; color: #5D5D5D; }
        .mob .leadSub2 { font-size: 18px; font-weight: 400; line-height: 1.5; color: #5D5D5D; }
        .mob .leadBox { width: 100%; max-width: 420px; background: transparent; border: 0; padding: 0; gap: 6px; }
        .mob .step { min-height: 64vh; }
        .mob .step:last-child { min-height: 44vh; }
        .mob .area { font-size: 20px; line-height: 24px; }
        .mob .num { font-size: 17px; }
        .mob .en { font-size: 22px; line-height: 30px; }
        .mob .ko { font-size: 20px; line-height: 28px; }
        .mob .desc { font-size: 17px; line-height: 24px; }
        /* \uBAA8\uBC14\uC77C Part B: \uC815\uC801 \uD0DC\uBE14\uB9BF + \uAC00\uB85C \uC790\uB3D9 \uCE90\uB7EC\uC140 */
        .mTablet { position: relative; width: 100%; max-width: 420px; margin: 0 auto 22px; }
        .mTablet .frame { position: relative; z-index: 2; width: 100%; height: auto; display: block; }
        .mTablet .screenArea { position: absolute; z-index: 1; overflow: hidden; }
        .mCar { width: 100%; overflow: hidden; padding: 4px 0 2px; }
        .mTrack { display: flex; gap: 10px; transition: transform .45s cubic-bezier(.2,.7,.2,1); will-change: transform; }
        .mCard { flex: 0 0 306px; width: 306px; min-height: 196px; box-sizing: border-box; background: #FAFAFA; border: 0; border-radius: 20px; padding: 24px 26px; text-align: left; display: flex; flex-direction: column; gap: 7px; cursor: pointer; font-family: inherit; opacity: .5; transform: scale(.95); transition: opacity .3s ease, transform .3s ease; }
        .mCard.on { opacity: 1; transform: scale(1); }
        .mCard:focus-visible { outline: 3px solid rgba(106,204,141,.6); outline-offset: 2px; }
        .mCardHead { display: flex; align-items: center; gap: 9px; }
        .mCardHead .dotG { width: 10px; height: 10px; border-radius: 999px; background: #6ACC8D; flex: 0 0 auto; }
        .mArea { font-weight: 700; font-size: 18px; color: #6ACC8D; }
        .mNum { margin-left: auto; font-family: "Pretendard","Apple SD Gothic Neo",sans-serif; font-weight: 600; font-size: 14px; line-height: 1.8; color: rgba(1,2,5,0.4); font-variant-numeric: tabular-nums; }
        .mNum b { font-weight: 600; color: #1C1C1C; }
        .mNum b { color: #010205; }
        .mCard.on .mNum b { text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 2px; }
        .mTitle { display: flex; flex-direction: column; gap: 1px; margin-top: 6px; }
        .mEn, .mKo { font-weight: 700; font-size: 18px; line-height: 22px; color: #1C1C1C; }
        .mDesc { margin: 6px 0 0; font-weight: 400; font-size: 18px; line-height: 22px; color: #7E7E7E; }
        .mDots { display: flex; justify-content: center; gap: 8px; margin-top: 18px; }

        .pr, .pr *, .pr-ov, .pr-ov * { box-sizing: border-box; }
        .pr {
          width: 100%; max-width: 100%; overflow-x: hidden; background: #ffffff;
          padding: 56px 20px 80px; font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif; color: #1a1a1a;
        }
        .pr-wrap { max-width: 1080px; margin: 0 auto; }
        .pr-head { text-align: center; margin-bottom: 48px; }
        .pr-head h2 { margin: 0; font-size: clamp(28px, 4vw, 42px); font-weight: 700; line-height: 54px; color: #1C1C1C; }
        .pr-head p { margin: 10px 0 0; color: #484848; font-size: 28px; font-weight: 300; line-height: 40px; }

        /* tabs */
        .pr-tabs { display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; margin: 0 auto 40px; max-width: 1080px; }
        .pr-tab {
          appearance: none; display: inline-flex; align-items: center; justify-content: center; white-space: nowrap;
          flex: 0 0 auto; width: 160px; height: 56px; padding: 0; min-width: 0;
          border: 1px solid #5D5D5D; background: transparent; color: #010205; border-radius: 50px;
          font-family: inherit; font-size: 18px; font-weight: 400; letter-spacing: -0.02em; line-height: 1; cursor: pointer; transition: all 0.15s ease;
        }
        .pr-tab:hover { background: rgba(28,28,28,0.04); }
        .pr-tab:focus-visible { outline: 3px solid rgba(230,84,27,0.45); outline-offset: 2px; }
        .pr-tab[aria-selected="true"] { background: #1C1C1C; color: #FFFFFF; border-color: #5D5D5D; }

        /* panel */
        .pr-panel { display: grid; grid-template-columns: 1fr 1.15fr; grid-template-areas: "info img" "note img"; column-gap: 40px; row-gap: 0; align-items: start; padding: 0 44px; }
        .pr-info { grid-area: info; }
        .pr-note { grid-area: note; }
        .pr-stagewrap { grid-area: img; align-self: center; }
        .pr-info, .pr-stagewrap { min-width: 0; }
        .pr-info h3 { margin: 0; font-size: 30px; font-weight: 700; line-height: 40px; letter-spacing: -0.02em; color: #1C1C1C; }
        .pr-info .lead { margin: 6px 0 0; font-size: 30px; font-weight: 300; line-height: 40px; letter-spacing: -0.02em; color: #5D5D5D; }
        .pr-info hr { border: 0; border-top: 1px solid #e7e7e7; width: 370px; max-width: 100%; margin: 30px 0; }
        .pr-feat { list-style: none; margin: 0; padding: 0; }
        .pr-feat li { display: flex; gap: 8px; align-items: flex-start; color: #5D5D5D; font-size: 26px; font-weight: 300; line-height: 43px; }
        .pr-feat li::before { content: "\u2713"; color: #C8C8C8; font-weight: 300; }
        .pr-note { display: flex; gap: 7px; margin: 36px 0 0; color: #989898; font-size: 15px; font-weight: 300; line-height: 1.5; letter-spacing: -0.3px; }
        .pr-note::before { content: "\u2022"; }

          position: relative; display: block; width: 100%; margin: 0; padding: 0; border: 0; background: transparent; cursor: pointer;
          border-radius: 16px; transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease;
        }
        .pr-thumb:hover, .pr-thumb:focus-visible { transform: translateY(-5px); box-shadow: 0 20px 44px rgba(0,0,0,0.16); }
        .pr-thumb:focus-visible { outline: 3px solid rgba(241,99,42,0.6); outline-offset: 4px; }
        .pr-thumbbox { position: relative; width: 100%; aspect-ratio: 350 / 220; border-radius: 16px; overflow: hidden; background: #fff; }
        .pr-thumbimg { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
        .pr-badge {
          position: absolute; top: 14px; right: 14px; z-index: 3; background: rgba(230,84,27,0.85); color: #fff;
          width: 54px; height: 54px; border-radius: 50%; display: grid; place-items: center; text-align: center; font-size: 14px; font-weight: 700; line-height: 1.2;
        }

        /* \uD654\uBA74\uC911\uC559 \uC624\uBC84\uB808\uC774 \u2014 \uB370\uC2A4\uD06C\uD0D1\uC740 pointer-events:none(\uD638\uBC84 \uC720\uC9C0), \uBAA8\uBC14\uC77C\uC740 \uD0ED\uC73C\uB85C \uB2EB\uAE30 */
        .pr-ov { position: fixed; inset: 0; z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 4vh 4vw; background: rgba(15,18,24,0); opacity: 0; pointer-events: none; transition: opacity .3s ease, background .3s ease; }
        .pr-ov.on { opacity: 1; background: rgba(15,18,24,.55); }
        .pr-ov.on.mob { pointer-events: auto; }
        .pr-ovinner { transform: scale(.9); opacity: 0; perspective: 2800px; transition: opacity .32s ease, transform .34s cubic-bezier(.2,.7,.2,1); display: flex; align-items: center; justify-content: center; }
        .pr-ov.on .pr-ovinner { transform: scale(1); opacity: 1; }
        .pr-ovinner.words { width: clamp(300px, 56vw, 600px); }
        .pr-ovinner.book { width: clamp(320px, 74vw, 920px); }
        .pr.reduce .pr-ov { transition: opacity .2s ease; }

        .pr-ovimg { display: block; max-height: 86vh; max-width: 88vw; width: auto; border-radius: 6px; box-shadow: 0 30px 60px rgba(0,0,0,.4); background: #fff; }

        /* \uB9AC\uD3EC\uD2B8 \uD50C\uB9BD */
        .pr-flipv { perspective: 2600px; }
        .pr-flipv-in { position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
        .pr-flipv-in.back { transform: rotateY(180deg); }
        .pr-flipv-face { display: block; max-height: 84vh; max-width: 86vw; width: auto; border-radius: 5px; box-shadow: 0 24px 60px rgba(0,0,0,.45); background: #fff; backface-visibility: hidden; }
        .pr-flipv-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); object-fit: contain; }

        /* \uCC45(\uB370\uC2A4\uD06C\uD0D1): \uD3BC\uCE5C \uCC45 \u2014 \uC624\uB978\uCABD \uD398\uC774\uC9C0\uB9CC \uCC45\uB4F1\uC5D0\uC11C \uB118\uAE40 */
        .pr-bk { width: 100%; display: flex; align-items: center; justify-content: center; perspective: 2600px; animation: prFade .4s ease; }
        @keyframes prFade { from { opacity: 0; } to { opacity: 1; } }
        .pr.reduce .pr-bk { animation: none; }
        .pr-bk-cover { display: block; max-height: 82vh; max-width: 100%; width: auto; border-radius: 5px; background: #fff; box-shadow: 4px 4px 0 -1px #e8e8e8, 8px 8px 0 -2px #d6d6d6, 0 24px 60px rgba(0,0,0,.45); }
        .pr-book { position: relative; width: 100%; }
        .pr-spr { position: absolute; inset: 0; display: flex; transform-style: preserve-3d; box-shadow: 0 30px 60px rgba(0,0,0,.34); border-radius: 4px; background: #fffdf7; }
        .pr-hf { position: relative; width: 50%; height: 100%; overflow: hidden; background: #fffdf7; }
        .pr-hf.left { border-radius: 6px 0 0 6px; } .pr-hf.right { border-radius: 0 6px 6px 0; }
        .pr-hf.left::after, .pr-hf.right::before { content: ""; position: absolute; top: 0; bottom: 0; width: 12%; pointer-events: none; z-index: 3; }
        .pr-hf.left::after { right: 0; background: linear-gradient(to right, transparent, rgba(0,0,0,.13)); }
        .pr-hf.right::before { left: 0; background: linear-gradient(to left, transparent, rgba(0,0,0,.13)); }
        .pr-leaf { position: absolute; top: 0; right: 0; width: 50%; height: 100%; transform-origin: left center; transform-style: preserve-3d; z-index: 4; transition: transform .85s cubic-bezier(.34,.06,.20,1); }
        .pr-face { position: absolute; inset: 0; overflow: hidden; -webkit-backface-visibility: hidden; backface-visibility: hidden; background: #fffdf7; }
        .pr-face.front { border-radius: 0 6px 6px 0; } .pr-face.back { transform: rotateY(180deg); border-radius: 6px 0 0 6px; }
        .pr-pg { width: 100%; height: 100%; background-size: 200% 100%; background-repeat: no-repeat; background-position-y: center; }
        /* \uCC45(\uBAA8\uBC14\uC77C): \uD55C \uD398\uC774\uC9C0\uC529 */
        .pr-bkm { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }

        .pr-wt-head { text-align: center; margin-bottom: 12px; }
        .pr-wt-head h4 { margin: 0; font-size: 22px; font-weight: 800; color: #3C4858; }
        .pr-wt-head p { margin: 5px 0 0; font-size: 14px; font-weight: 500; color: #7a828c; }
        .pr-wt-table { border: 1px solid #e7e7e7; border-radius: 6px; overflow: hidden; }
        .pr-wt-row { display: grid; grid-template-columns: 1fr 1.3fr; border-top: 1px solid #e7e7e7; }
        .pr-wt-row:first-child { border-top: 0; }
        .pr-wt-term { background: #fdf8f1; padding: 12px; border-right: 1px solid #e7e7e7; font-weight: 700; font-size: 16px; color: #333; text-align: center; }
        .pr-wt-mean { padding: 12px; font-size: 15px; color: #444; text-align: center; }

        /* ---- \uBAA8\uBC14\uC77C / \uC911\uAC04\uD3ED ---- */

        /* \uAD6C\uBD84\uC120: \uD14D\uC2A4\uD2B8 \uC778\uC14B(14px)\uC744 \uC0C1\uC1C4\uD574 \uD504\uB808\uC784 \uC778\uC14B(10px)\uAE4C\uC9C0 \uD655\uC7A5 \u2192 390 \uD504\uB808\uC784\uC5D0\uC11C 370px */

        /* \uBAA8\uBC14\uC77C: \uD0ED 2\uC5F4 \uADF8\uB9AC\uB4DC(\uB77C\uBCA8 \uC548 \uC798\uB9BC) */
