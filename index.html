<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>참빛북클럽 — 맥그로힐 원더스 기반 빅데이터 영어 독서</title>
<meta name="description" content="미국 국공립 초등 읽기 교재 맥그로힐 원더스(Wonders)와 빅데이터 기반 영어 독서 서비스. 14일 무료 체험으로 시작하세요." />
<meta property="og:title" content="참빛북클럽 — 맥그로힐로 시작하는 영어 독서" />
<meta property="og:description" content="14일 무료 체험으로 시작하는 빅데이터 기반 영어 독서 서비스" />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://cdn.bookclubs.co.kr/chambit_main/thumbnail.jpg" />
<link rel="icon" href="https://new.bookclubs.co.kr/favicon.ico" />
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
    background: #ffffff; color: #111;
    -webkit-text-size-adjust: 100%;
    overflow-x: hidden;
  }
  #root { width: 100%; overflow-x: hidden; }

  .reveal { transition: opacity .6s cubic-bezier(.22,.61,.36,1), transform .6s cubic-bezier(.22,.61,.36,1); }
  .reveal.armed { opacity: 0; }
  .reveal.armed.tf { transform: translateY(40px); will-change: opacity, transform; }
  .reveal.in { opacity: 1 !important; transform: none !important; }

  .kakaoFloat {
    position: fixed; right: clamp(14px, 3vw, 22px); bottom: clamp(14px, 3vw, 22px); z-index: 9999;
    width: clamp(60px, 12vw, 84px); height: clamp(60px, 12vw, 84px); display: block;
    animation: kfloat 2.8s ease-in-out infinite;
    transition: transform .15s ease, filter .15s ease;
  }
  .kakaoFloat img {
    width: 100%; height: 100%; object-fit: contain; display: block;
    filter: drop-shadow(0 5px 12px rgba(0,0,0,0.30));
  }
  .kakaoFloat:hover { transform: translateY(-4px) scale(1.05); }
  .kakaoFloat:hover img { filter: drop-shadow(0 8px 16px rgba(0,0,0,0.32)); }
  .kakaoFloat:active { transform: scale(0.96); }
  .kakaoFloat:focus-visible { outline: 3px solid #FF6427; outline-offset: 3px; border-radius: 8px; }
  @keyframes kfloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-9px); } }
  @media (prefers-reduced-motion: reduce) { .kakaoFloat { animation: none; } .reveal { transition: none; } }

  .nojs-fallback {
    display: none; padding: 40px 20px; text-align: center;
    font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif; color: #333; line-height: 1.7;
  }
  .nojs-fallback a {
    display: inline-block; margin-top: 16px; padding: 14px 28px;
    background: #FF6427; color: #fff; border-radius: 70px; font-weight: 700; text-decoration: none;
  }
</style>
</head>

        * { box-sizing: border-box; }

        .header {
          width: 100vw;
          max-width: 100%;
          overflow-x: hidden;
          background: #ffffff;
          display: flex;
          justify-content: center;            /* \uC13C\uD130 \uC815\uB82C \uC720\uC9C0 */
          font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
        }
        .headerInner {
          width: 100%;
          max-width: 1200px;                  /* \uC13C\uD130\uAC12 \uC720\uC9C0 */
          padding: 0 24px;
          display: flex;
          align-items: center;
        }

        .logo {
          height: auto;
          display: block;
          flex-shrink: 0;
          cursor: pointer;
        }

        .nav {
          display: flex;
          align-items: center;
          font-size: 16px;
          line-height: 24px;
          white-space: nowrap;
          flex-shrink: 0;
        }
        .navLink {
          background: none; border: 0; padding: 0; font: inherit;
          cursor: pointer; text-decoration: none; transition: color 0.15s ease;
        }
        .navHome { color: #252432; font-weight: 700; } /* Figma 1:227 \uC2E4\uCE21: #252432 / Bold */
        .navItem { color: #6B6B6B; font-weight: 500; } /* Figma \uC6D0\uBCF8 #989898\uC740 AA \uB300\uBE44 \uBBF8\uB2EC(2.9:1) \u2192 AA \uD1B5\uACFC \uB300\uCCB4\uAC12(4.5:1+). \uBE0C\uB79C\uB4DC\uD300 \uD655\uC815 \uC2DC \uAD50\uCCB4 */
        .navItem:hover { color: #111111; }
        .navHome:hover { opacity: 0.7; }

        .actions {
          /* margin-left:auto \uC81C\uAC70: headerInner\uC758 space-between\uC774 \uBC30\uCE58\uB97C \uB2F4\uB2F9.
             (auto margin\uC744 \uC4F0\uBA74 \uB85C\uACE0\u2194nav \uC5EC\uBC31\uC740 \uACE0\uC815, nav\u2194CTA \uC5EC\uBC31\uB9CC \uB0A8\uB294 \uACF5\uAC04\uC744 \uC804\uBD80
             \uD761\uC218\uD574 \uD0DC\uBE14\uB9BF \uD3ED\uC5D0\uC11C \uB450 \uC5EC\uBC31\uC774 \uBD88\uADE0\uB4F1\uD574\uC9C0\uB294 \uC6D0\uC778\uC774 \uB428) */
          display: flex;
          align-items: center;
          gap: 26px;
          white-space: nowrap;
          flex-shrink: 0;          /* \uBC84\uD2BC \uC601\uC5ED\uC740 \uC808\uB300 \uC548 \uC904\uACE0 \uC548 \uBC00\uB9BC */
          padding-left: 24px;
        }
        .enterButton {
          display: inline-flex; align-items: center; justify-content: center;
          width: 171px; height: 50px; border: 0; border-radius: 100px;
          background: #0B0B0B; color: #ffffff; font-size: 16px; font-weight: 800;
          padding: 12px 35px; gap: 10px; white-space: nowrap; cursor: pointer;
          transition: background 0.15s ease, transform 0.1s ease;
        } /* Figma "\uBD81\uD074\uB7FD \uB4E4\uC5B4\uAC00\uAE30" \uC2E4\uCE21: width(\uACE0\uC815, min-width \uC544\uB2D8) 171x50 / padding 12px 35px / gap 10px / bg #0B0B0B / radius 100px.
             \u26A0 \uD5E4\uB354 \uD589 \uC804\uCCB4\uAC00 1200px\uB97C \uB118\uC9C0 \uC54A\uC73C\uB824\uBA74 \uC774 \uAC12\uC774 min-width\uAC00 \uC544\uB2CC \uACE0\uC815 width\uC5EC\uC57C \uD568(\uC2E4\uCE21 \uC644\uB8CC).
             \uD14D\uC2A4\uD2B8\uAC00 171-70=101px \uC548\uC5D0 \uB4E4\uC5B4\uAC00\uB294\uC9C0\uB294 \uD3F0\uD2B8 \uB80C\uB354\uB9C1\uC5D0 \uB530\uB77C \uAC08\uB9B4 \uC218 \uC788\uC5B4 \uC2E4\uBE0C\uB77C\uC6B0\uC800 \uD655\uC778 \uD544\uC694 \u2014 \uB118\uCE58\uBA74 overflow:hidden\uC73C\uB85C \uC790\uB974\uC9C0 \uB9D0\uACE0 letter-spacing/font-size \uCD95\uC18C\uB85C \uB300\uC751\uD560 \uAC83 */
        .enterButton:hover { background: #2a2a2a; }
        .enterButton:active { transform: scale(0.97); }
        .logout {
          background: none; border: 0; padding: 0; font: inherit;
          color: #282828; font-size: 16px; font-weight: 500; cursor: pointer;
          transition: opacity 0.15s ease;
        } /* Figma 1:231 \uC2E4\uCE21: #282828 / Medium */
        .logout:hover { opacity: 0.6; text-decoration: underline; }

        /* \uD584\uBC84\uAC70 */
        .hamburger {
          width: 44px; height: 44px;
          background: none; border: 0; padding: 0; cursor: pointer;
          display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 5px;
        }
        .hamburger span { display: block; width: 26px; height: 2px; background: #111; border-radius: 2px; }

        /* \uBAA8\uBC14\uC77C \uC6B0\uCE21 \uC544\uC774\uCF58 \uBC84\uD2BC(\uB85C\uADF8\uC544\uC6C3) + \uBE44\uB85C\uADF8\uC778 \uC2DC \uC815\uB82C\uC6A9 \uC2A4\uD398\uC774\uC11C */
        .iconBtn {
          width: 44px; height: 44px; flex-shrink: 0;
          background: none; border: 0; padding: 0; cursor: pointer; color: #111;
          display: inline-flex; align-items: center; justify-content: center;
          transition: opacity 0.15s ease;
        }
        .iconBtn:hover { opacity: 0.6; }
        .iconBtn:active { transform: scale(0.94); }
        .hdrSpacer { width: 44px; height: 44px; flex-shrink: 0; }

        /* \uD0A4\uBCF4\uB4DC \uD3EC\uCEE4\uC2A4 \uB9C1 \u2014 \uB9C8\uC6B0\uC2A4 \uD074\uB9AD \uC2DC \uC548 \uB728\uACE0 Tab \uD0D0\uC0C9 \uC2DC\uC5D0\uB9CC \uD45C\uC2DC (WCAG 2.1 AA) */
        /* outline \uC0AC\uC6A9\uC73C\uB85C \uB808\uC774\uC544\uC6C3 \uBC00\uB9BC \uC5C6\uC74C. \uBE0C\uB79C\uB4DC \uC624\uB80C\uC9C0 #FF6427 */
        .logo:focus-visible,
        .navLink:focus-visible,
        .enterButton:focus-visible,
        .logout:focus-visible,
        .iconBtn:focus-visible,
        .hamburger:focus-visible,
        .closeBtn:focus-visible {
          outline: 2.5px solid #FF6427;
          outline-offset: 4px;
          border-radius: 6px;
        }
        /* pill \uBC84\uD2BC\uC740 \uB77C\uC6B4\uB4DC\uC5D0 \uB9DE\uCDB0 \uB9C1\uB3C4 \uB465\uAE00\uAC8C */
        .enterButton:focus-visible { border-radius: 100px; }
        /* \uB9C8\uC6B0\uC2A4 \uD074\uB9AD \uC2DC \uC794\uB958 outline \uC81C\uAC70(focus-visible \uBBF8\uC9C0\uC6D0 \uD3F4\uBC31) */
        .navLink:focus:not(:focus-visible),
        .enterButton:focus:not(:focus-visible),
        .logout:focus:not(:focus-visible),
        .hamburger:focus:not(:focus-visible),
        .closeBtn:focus:not(:focus-visible),
        .logo:focus:not(:focus-visible) { outline: none; }

        /* \uB4DC\uB85C\uC5B4 + \uC624\uBC84\uB808\uC774 */
        .overlay {
          position: fixed; inset: 0; background: rgba(0,0,0,0.45);
          opacity: 0; pointer-events: none; transition: opacity 0.25s ease; z-index: 50;
        }
        .overlay.show { opacity: 1; pointer-events: auto; }
        .drawer {
          position: fixed; top: 0; left: 0; height: 100%;
          width: min(300px, 82vw); background: #fff; z-index: 60;
          transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
          box-shadow: 8px 0 24px rgba(0,0,0,0.12);
          display: flex; flex-direction: column; padding: 20px 24px 28px;
        }
        .drawer.open { transform: translateX(0); }
        .closeBtn {
          align-self: flex-end; width: 40px; height: 40px; border: 0; background: none;
          font-size: 24px; color: #111; cursor: pointer; line-height: 1;
        }
        .drawerNav { display: flex; flex-direction: column; gap: 4px; margin-top: 8px; }
        .drawerNav .navLink {
          text-align: left; padding: 16px 4px; font-size: 18px; font-weight: 700;
          color: #111; border-bottom: 1px solid #f0f0f0;
        }
        .drawerActions { display: flex; flex-direction: column; gap: 12px; margin-top: 24px; }
        .drawerActions .enterButton { width: 100%; height: 52px; }
        .drawerActions .logout { align-self: center; padding: 8px; font-size: 15px; }

        * { box-sizing: border-box; }

        .heroSection {
          position: relative;
          width: 100vw;
          max-width: 100%;
          overflow-x: hidden;
          background: #ffffff;
          padding: 28px 0 0;
          font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
        }
        .heroSection:focus-visible {
          outline: 3px solid #FF6427;
          outline-offset: -3px;
        }

        /* \uC774\uBBF8\uC9C0 \uBC30\uB108: \uB85C\uB529 \uC2A4\uCF08\uB808\uD1A4(\uC815\uC801 \uD50C\uB808\uC774\uC2A4\uD640\uB354) + \uC5D0\uB7EC \uD3F4\uBC31 */
        .slide.isImage { background: #ece9fb; }
        .imgFallback {
          width: 100%;
          height: 100%;
          display: flex;
          align-items: center;
          justify-content: center;
          padding: 0 8%;
          text-align: center;
          background: linear-gradient(135deg, #ece9fb, #ded8f7);
          color: #6b6480;
          font-weight: 600;
          font-size: clamp(13px, 1.4vw, 16px);
          line-height: 1.5;
        }

        .track {
          display: flex;
          align-items: center;
          will-change: transform;
        }

        .slide {
          flex: 0 0 auto;
          width: min(1280px, 86vw);      /* CSS\uB85C \uD06C\uAE30 \uACB0\uC815 \u2192 \uB9AC\uD50C\uB85C\uC6B0\uAC00 \uC790\uB3D9 \uCD94\uC801\uB418\uB3C4\uB85D */
          aspect-ratio: 1280 / 652;      /* JS \uBBF8\uC2E4\uD589(\uC815\uC801 \uCE94\uBC84\uC2A4) \uB300\uBE44 fallback (\uBC30\uB108 \uAE30\uC900 \uBE44\uC728) */
          border-radius: 50px;           /* \uCE74\uB4DC \uBAA8\uC11C\uB9AC \uBC18\uACBD */
          overflow: hidden;
          transform: translateZ(0);      /* \uD2B8\uB79C\uC2A4\uD3FC \uC870\uC0C1\uC5D0\uB3C4 \uB77C\uC6B4\uB529 \uD074\uB9AC\uD551 \uBCF4\uC7A5(\uBAA8\uC11C\uB9AC \uB0A8\uAE40 \uBC29\uC9C0) */
          cursor: pointer;
          transition: opacity 0.4s ease;
        }
        /* JS\uAC00 \uCE21\uC815\uD55C px \uB192\uC774\uAC00 \uC788\uC73C\uBA74 \uADF8 \uAC12\uC774 \uC6B0\uC120 \u2192 aspect-ratio \uC720\uB839 \uB192\uC774 \uC608\uC57D \uBC29\uC9C0 */
        .slide[data-h] { aspect-ratio: auto; }
        .slide.inactive { opacity: 0.55; }

        .slide.isImage img {
          width: 100%;
          height: 100%;
          object-fit: cover;
          display: block;
          border-radius: inherit; /* \uBAA8\uC11C\uB9AC \uB0A8\uAE40 \uBC29\uC9C0 */
        }
        .textBanner { border-radius: inherit; }
        .slide > a { display: block; height: 100%; border-radius: inherit; overflow: hidden; }

        /* 1) \uD14D\uC2A4\uD2B8 \uAE30\uBCF8 \uBC30\uB108 \u2014 \uBC30\uACBD(main_bg.webp) + \uC6C0\uC9C1\uC774\uB294 \uCE90\uB9AD\uD130(main_img.gif, \uC808\uB300\uBC30\uCE58) */
        .textBanner {
          position: relative;
          width: 100%;
          height: 100%;
          background-color: #8C7AF0; /* \uD3F4\uBC31/\uC5EC\uBC31 \uCEEC\uB7EC */
          background-image: url(${k});
          background-repeat: no-repeat;
          background-position: center;
          background-size: cover;
          display: flex;
          flex-direction: column;
          justify-content: center;
          gap: clamp(20px, 3vw, 44px);
          padding: 0 9%;
        }
        /* \uCE90\uB9AD\uD130 GIF \u2014 \uC88C\uD45C\uB294 \uBC30\uB108 1280\xD7652 \uAE30\uC900, \uD3ED \uBE44\uB840 */
        .slide .heroChars {
          position: absolute;
          left: 32.81%;   /* 420 / 1280 */
          top: 15.03%;    /* 98 / 652 */
          width: 82.97%;  /* 1062 / 1280 */
          height: auto;   /* 1062:598 \uBE44\uC728 \uC720\uC9C0 */
          object-fit: contain;
          z-index: 1;
          pointer-events: none;
          user-select: none;
        }
        /* \uD14D\uC2A4\uD2B8\uB294 GIF \uC704\uB85C */
        .textBanner > h1,
        .textBanner > p,
        .textBanner > .heroCta { position: relative; z-index: 2; }
        .heroTitle {
          font-weight: 800; /* ExtraBold */
          font-size: clamp(30px, 4.9vw, 75px);
          line-height: 1.14;
          letter-spacing: 0;
          color: #ffffff;
          margin: 0;
          word-break: keep-all;   /* \uD55C\uAE00 \uB2E8\uC5B4 \uC911\uAC04 \uBD84\uB9AC \uBC29\uC9C0(P1 #2) */
          overflow-wrap: break-word;
        }
        .heroSub {
          font-weight: 300; /* Light (\uC6D0\uBCF8 \uC2A4\uD399\uC740 Medium\uC774\uB098 \uD504\uB85C\uC81D\uD2B8 \uC9C0\uCE68\uC0C1 Light \uD1B5\uC77C) */
          font-size: clamp(13px, 1.1vw, 16px);
          line-height: 1.8;        /* 180% */
          letter-spacing: 0;       /* \uC790\uAC04 0% */
          color: rgba(255, 255, 255, 0.8); /* \uCC44\uC6B0\uAE30 \uD770\uC0C9 80% */
          margin: 0;
          word-break: keep-all;   /* \uD55C\uAE00 \uB2E8\uC5B4 \uC911\uAC04 \uBD84\uB9AC \uBC29\uC9C0(P1 #2) */
          overflow-wrap: break-word;
        }
        .heroCta {
          display: flex;
          align-items: center;
          gap: 36px;              /* \uBC84\uD2BC+\uB9C1\uD06C \uC804\uCCB4 329 \uAE30\uC900 (183+110+36) */
          flex-wrap: wrap;
        }
        .ctaPrimary {
          display: inline-flex;
          align-items: center;
          justify-content: center;
          gap: 5px;
          /* \uD654\uC774\uD2B8 \uBCA0\uC774\uC2A4 \uC704\uC5D0 FF6427 \u2192 \uB4A4 \uBC30\uACBD \uBE44\uCE68 \uC5C6\uC774 \uC815\uD655\uD55C \uBE0C\uB79C\uB4DC \uC624\uB80C\uC9C0 */
          background-color: #ffffff;
          background-image: linear-gradient(#FF6427, #FF6427);
          color: #ffffff;
          font-weight: 700; /* Bold */
          font-size: clamp(13px, 1.1vw, 16px);
          line-height: 1.4;
          letter-spacing: -0.02em; /* -2% */
          padding: 14px 32px;        /* \uD14D\uC2A4\uD2B8(W119)+\uC88C\uC6B0 32 \u2192 \uD5C8\uADF8 W183 \xD7 H50 */
          border: 0;
          border-radius: 70px;
          white-space: nowrap;
          cursor: pointer;
          text-decoration: none;
          transition: background-image 0.15s ease, transform 0.1s ease;
        }
        .ctaPrimary:hover { background-image: linear-gradient(#e85718, #e85718); }
        .ctaPrimary:active { transform: scale(0.97); }
        .ctaPrimary svg { display: block; }
        .ctaPrimary:focus-visible,
        .ctaSecondary:focus-visible {
          outline: 3px solid #ffffff;
          outline-offset: 3px;
          border-radius: 6px;
        }
        .ctaSecondary {
          display: inline-flex;
          align-items: center;
          color: #010205; /* \uBE0C\uB79C\uB4DC \uC9C0\uC815 \uC0C9 */
          font-weight: 600; /* SemiBold */
          font-size: clamp(13px, 1.1vw, 16px);
          line-height: 1.8;
          text-decoration: underline;
          white-space: nowrap;
          cursor: pointer;
        }
        .ctaSecondary:hover { opacity: 0.7; }

        /* \uD0DC\uBE14\uB9BF(721~1024): \uCE90\uB9AD\uD130\uB97C \uC6B0\uD558\uB2E8\uC73C\uB85C \uCD95\uC18C\xB7\uC774\uB3D9, \uD14D\uC2A4\uD2B8\uB294 \uC88C\uCE21 \uC601\uC5ED\uC73C\uB85C \uD3ED \uC81C\uD55C(\uACB9\uCE68 \uBC29\uC9C0) */
        .tab .slide .heroChars { left: auto; right: 0; top: auto; bottom: 0; width: 52%; }
        .tab .textBanner > h1,
        .tab .textBanner > p,
        .tab .textBanner > .heroCta { max-width: 56%; }

        /* \uBAA8\uBC14\uC77C (JS\uB85C .mob \uD074\uB798\uC2A4 \uBD80\uC5EC \u2014 @media \uBBF8\uC791\uB3D9 \uB80C\uB354 \uD658\uACBD \uB300\uC751) */
        .heroSection.mob { padding: 8px 0; }
        /* \uBAA8\uBC14\uC77C: \uBAA8\uB4E0 \uBC30\uB108 \uB3D9\uC77C \uADDC\uACA9(\uBC18\uACBD 20), \uBC30\uACBD cover, \uC606 \uBC30\uB108 \uBBF8\uB178\uCD9C */
        .mob .slide { border-radius: 20px; width: min(1280px, 94vw); aspect-ratio: 368 / 380; }
        .mob .textBanner {
          gap: 16px;
          padding: 0 8%;
          background-position: center;
          background-size: cover;
        }
        /* \uCE90\uB9AD\uD130: \uBAA8\uBC14\uC77C \uC88C\uD45C \uAE30\uC900 (\uBC30\uB108 390 \uAE30\uC900 left 31% top 47% width 82%) */
        .mob .slide .heroChars {
          left: 31%; right: auto;
          top: 47%; bottom: auto;
          width: 82%;
        }
        /* \uD5E4\uB4DC\uB77C\uC778 ExtraBold 37 / 120% */
        .mob .heroTitle { font-size: clamp(28px, 9.5vw, 34px); line-height: 1.2; }
        /* \uC11C\uBE0C\uBB38\uAD6C Light / 13\u219214(\uC811\uADFC\uC131 \uCD5C\uC18C) / 135% / -4% / \uD770\uC0C9 75% (weight\uB9CC Light \uD1B5\uC77C) */
        .mob .heroSub { font-weight: 300; font-size: 14px; line-height: 1.35; letter-spacing: -0.04em; color: rgba(255,255,255,0.75); }
        /* \uBC84\uD2BC+\uB9C1\uD06C: \uC88C\uCE21 \uBE14\uB85D, \uC11C\uB85C \uAC00\uC6B4\uB370 \uC815\uB82C, \uB3D9\uC77C \uAC04\uACA9 */
        .mob .heroCta { gap: 17px; flex-direction: column; align-self: flex-start; align-items: center; }
        /* \uBC84\uD2BC 146\xD740 / \uBC18\uACBD 100 / SemiBold 14 / -2% */
        .mob .ctaPrimary {
          width: 141px; height: 40px; padding: 0;
          font-weight: 600; font-size: 14px; letter-spacing: -0.02em;
          border-radius: 100px;
        }
        /* 1:1 \uC0C1\uB2F4 SemiBold / \uAC80\uC815(text-black) / \uD130\uCE58 44px */
        .mob .ctaSecondary {
          font-weight: 600; font-size: 14px; letter-spacing: 0;
          color: #010205; padding-left: 0; min-height: 44px;
        }

        /* \uC774\uC804/\uB2E4\uC74C \uD654\uC0B4\uD45C \uBC84\uD2BC \u2014 \uC0AC\uC6A9\uC790 \uC694\uCCAD\uC73C\uB85C \uBAA8\uBC14\uC77C\uC5D0\uC11C\uB3C4 \uC228\uAE40(\uD558\uB2E8 dots \uC778\uB514\uCF00\uC774\uD130\uB85C\uB9CC \uC774\uB3D9).
           \uB370\uC2A4\uD06C\uD0D1/\uD0DC\uBE14\uB9BF\uC740 \uC2A4\uC640\uC774\uD504 \uB300\uC2E0 peek\xB7\uD074\uB9AD \uC774\uB3D9\uC774 \uC788\uC5B4 \uC6D0\uB798\uBD80\uD130 \uC228\uAE40. */
        .navBtn {
          display: none;
          position: absolute;
          top: 50%;
          transform: translateY(-50%);
          width: 44px;
          height: 44px;
          border: 0;
          border-radius: 50%;
          background: rgba(1, 2, 5, 0.35);
          color: #ffffff;
          align-items: center;
          justify-content: center;
          padding: 0;
          cursor: pointer;
          z-index: 3;
        }
        .navBtn svg { display: block; pointer-events: none; }
        .navBtn:hover { background: rgba(1, 2, 5, 0.5); }
        .navBtn:active { transform: translateY(-50%) scale(0.94); }
        .navBtn:focus-visible {
          outline: 3px solid #ffffff;
          outline-offset: 2px;
        }
        .mob .navBtn.prev { left: 12px; }
        .mob .navBtn.next { right: 12px; }

        /* \uBAA8\uBC14\uC77C \uC804\uC6A9 \uC778\uB514\uCF00\uC774\uD130(\uD1A0\uAE00) \u2014 \uD604\uC7AC \uBC30\uB108 \uC704\uCE58 \uD45C\uC2DC + \uD0ED \uC774\uB3D9 */
        .dots {
          display: none;
          justify-content: center;
          align-items: center;
          gap: 4px;
          margin-top: 4px;
        }
        .mob .dots { display: flex; }
        .dot {
          width: 44px;   /* \uD130\uCE58 \uD0C0\uAE43 44px \uD655\uBCF4(\uC2DC\uAC01 \uD06C\uAE30\uB294 ::after\uB85C \uCD95\uC18C) */
          height: 44px;
          border: 0;
          background: transparent;
          padding: 0;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
        }
        .dot::after {
          content: "";
          width: 8px;
          height: 8px;
          border-radius: 4px;
          background: rgba(1, 2, 5, 0.22);
          transition: background-color 0.2s ease, width 0.2s ease;
        }
        .dot.active::after { width: 20px; background: #FF6427; }
        .dot:focus-visible { outline: 2px solid #FF6427; outline-offset: 2px; }


        /* \uB85C\uB4DC \uC21C\uCC28 \uB4F1\uC7A5(\uAC15\uC870\uC810 1) \u2014 transform/opacity\uB9CC, reduce\xB7\uC815\uC801 \uC2DC \uBBF8\uC801\uC6A9 */

    * { box-sizing: border-box; }
    .statsSection { width:100vw; max-width:100%; overflow-x:hidden; background:#fff; display:flex; justify-content:center; padding:101px 24px 0; font-family:"Pretendard","Apple SD Gothic Neo",Arial,sans-serif; }
    .statsSection.mob { padding:16px 18px; }

    .stageWrap { position:relative; overflow:hidden; }
    .stage { position:absolute; top:0; left:0; width:${h}px; height:${b}px; transform-origin:top left; }
    .stage > * { position:absolute; }

    .heading { left:31px; top:0; margin:0; white-space:nowrap; font-weight:700; font-size:28px; line-height:36px;
      background:${rm}; background-size:220% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
      opacity:0; transform:translateY(14px); transition:opacity .7s ease, transform .7s ease; }
    .in .heading { opacity:1; transform:none; animation:flow 5s ease-in-out 1s infinite; }

    .stat { display:flex; flex-direction:column; gap:13px; top:5px; }
    .statLabel { font-size:14px; font-weight:500; color:#3B3B3B; letter-spacing:-0.26px; white-space:nowrap; }
    .statValue { font-size:32px; font-weight:700; color:#3B3B3B; letter-spacing:-0.64px; white-space:nowrap; display:inline-flex; align-items:center; }
    .statValue .pct { font-size:21px; }

    .awards { left:54px; top:108px; width:392px; height:auto; display:block;
      filter:drop-shadow(0 11px 14px rgba(0,0,0,0.10));
      opacity:0; transform:translateY(18px) scale(.97); transition:opacity .7s ease .15s, transform .7s ease .15s; }
    .in .awards { opacity:1; transform:none; }

    .graph { left:0px; top:51px; width:1213px; height:396px; }
    .graph svg { width:1213px; height:396px; overflow:visible; }
    .curve { fill:none; stroke:url(#curveGrad); stroke-width:6; stroke-linecap:round;
      stroke-dasharray:1; stroke-dashoffset:1; will-change:stroke-dashoffset;
      transition:stroke-dashoffset .9s cubic-bezier(.33,0,.2,1) .05s; }
    .in .curve { stroke-dashoffset:0; }
    .dline { opacity:0; transition:opacity .45s ease; }
    .in .dline { opacity:1; }
    .dline line { stroke:#D8D8D8; stroke-width:1.5; stroke-dasharray:4 5; }
    .dline path { stroke:#D8D8D8; stroke-width:1.6; fill:none; stroke-linecap:round; stroke-linejoin:round; }
    .pt { opacity:0; transform:scale(0); transform-box:fill-box; transform-origin:center; will-change:transform,opacity;
      transition:transform .4s cubic-bezier(.34,1.56,.64,1), opacity .3s ease; }
    .in .pt { opacity:1; transform:scale(1); }

    .anno { opacity:0; transform:translateY(14px); will-change:transform,opacity; transition:opacity 1s cubic-bezier(.22,.61,.36,1), transform 1s cubic-bezier(.22,.61,.36,1); }
    .in .anno { opacity:1; transform:none; }
    .list { list-style:none; margin:0; padding:0; }
    .list li { font-size:12px; font-weight:300; color:#595959; line-height:17px; letter-spacing:-0.24px; white-space:normal; word-break:keep-all; padding-left:11px; position:relative; }
    .list li::before { content:"\xB7"; position:absolute; left:2px; top:-1px; }
    /* \uADF8\uB798\uD504\uAC00 \uC62C\uB77C\uC624\uB294 \uB3D9\uC548 \uC904 \uB2E8\uC704\uB85C \uC8FC\uB974\uB975 \uB4F1\uC7A5 \u2014 \uADF8\uB798\uD504\uBCF4\uB2E4\uB294 \uB290\uAE0B\uD558\uAC8C */
    .list.stagger li { opacity:0; transform:translateY(10px); will-change:opacity,transform;
      transition:opacity .95s cubic-bezier(.22,.61,.36,1), transform .95s cubic-bezier(.22,.61,.36,1); }
    .in .list.stagger li { opacity:1; transform:none; }

    .pillWrap { left:941px; top:146px; width:294px; height:117px; filter:drop-shadow(0 10px 8px rgba(232,105,55,0.22)); }
    .pillImg { display:block; width:294px; height:117px; }
    .pillText { left:951px; top:157px; width:273px; height:82px; display:flex; flex-direction:column; align-items:center; justify-content:center;
      color:#fff; font-weight:600; font-size:24px; line-height:26px; letter-spacing:-0.48px; text-align:center; }

    /* \uBAA8\uBC14\uC77C */
    .mInner { width:100%; max-width:460px; }
    .mHeading { margin:0 0 26px; font-weight:700; font-size:24px; line-height:1.4; color:#1C1C1C; text-align:center; }
    .mStats { display:flex; justify-content:space-between; gap:12px; margin-bottom:26px; }
    .mStat { display:flex; flex-direction:column; gap:8px; align-items:center; flex:1; }
    .mStat .statLabel { font-weight:300; font-size:12px; color:#5D5D5D; }
    .mStat .statValue { font-size:24px; font-weight:700; color:#1C1C1C; }
    .mStat .statValue .pct { font-size:16px; }
    .stCard { border:1px solid #E5E5E5; background:transparent; border-radius:14px; padding:12px 18px; opacity:0; transform:translateY(14px); transition:opacity .5s ease, transform .5s ease; }

    .mCarousel { width:100%; }
    .mViewport { overflow:hidden; transition:height .5s cubic-bezier(.4,0,.2,1); }
    .reduce .mViewport { transition:none; }
    .mTrack { display:flex; align-items:flex-start; transition:transform .5s cubic-bezier(.4,0,.2,1); }
    .reduce .mTrack { transition:none; }
    .mSlide { flex:0 0 100%; min-width:100%; padding:0 2px; }

    /* \u2500\u2500 \uC740\uC740\uD55C \uC0C1\uC2DC \uBAA8\uC158(\uC2DC\uC120 \uC720\uB3C4) \u2500\u2500 */
    /* \uD5E4\uB529 \uADF8\uB77C\uB370\uC774\uC158 \uC88C\uC6B0 \uD750\uB984 */

    /* \uADF8\uB798\uD504 \uC810 ping(\uBC18\uC9DD) \u2014 \uB4F1\uC7A5 \uC644\uB8CC \uD6C4 \uD37C\uC9C0\uB294 \uB9C1 */
    .ping { transform-box:fill-box; transform-origin:center; opacity:0; }
    .in .ping { animation:ping 2.8s cubic-bezier(.2,.6,.3,1) infinite; }
    @keyframes ping { 0%{transform:scale(1);opacity:.55} 70%{opacity:0} 100%{transform:scale(3);opacity:0} }
    /* \uB9D0\uD48D\uC120 \uC228\uC26C\uB294 \uAE00\uB85C\uC6B0 */
    .in .pillWrap { animation:breathe 3.2s ease-in-out 3s infinite; }
    @keyframes breathe {
      0%,100%{ filter:drop-shadow(0 10px 8px rgba(232,105,55,0.22)); }

        .cbkSection * { box-sizing: border-box; }

        .cbkSection {
          position: relative;
          width: 100%; max-width: 100%; margin: 0 auto;
          overflow-x: hidden;
          background: #ffffff;
          /* \uD558\uB2E8 \uD328\uB529 0\uC73C\uB85C \uC6D0\uBCF5 \u2014 28px\uB9CC \uC918\uB3C4 \uC774\uC911 \uC2A4\uD06C\uB864\uC774 \uC7AC\uD604\uB41C\uB2E4\uB294 \uB9AC\uD3EC\uD2B8(2026-07-09)\uB85C
             "\uADF8\uB77C\uB370\uC774\uC158\uC774 \uC0B4\uC9DD \uC090\uC838\uB098\uC640 \uBCF4\uC774\uAC8C" \uD558\uB294 \uD6A8\uACFC\uB97C \uC644\uC804\uD788 \uD3EC\uAE30. \uD398\uC774\uC9C0 \uB192\uC774\uB97C
             1px\uB3C4 \uB298\uB9AC\uC9C0 \uC54A\uB294 \uAC78 \uCD5C\uC6B0\uC120\uC73C\uB85C \uD568(\xA7 \uC808\uB300 \uC774\uC911 \uC2A4\uD06C\uB864 \uAE08\uC9C0 \u2014 \uC0AC\uC6A9\uC790 \uD655\uC815). */
          padding: 114px 0 0;
          font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif;
        }

        /* \u26A0 cbkGlow\uB294 cbkStage\uAC00 \uC544\uB2C8\uB77C cbkSection \uBC14\uB85C \uC544\uB798 \uD615\uC81C \u2014 top:%\uB294 \uD5E4\uB4DC \uD14D\uC2A4\uD2B8\uAE4C\uC9C0 \uD3EC\uD568\uD55C
           \uC139\uC158 \uC804\uCCB4 \uB192\uC774 \uAE30\uC900\uC774\uB77C \uD0DC\uBE14\uB9BF \uB192\uC774\uB9CC\uC73C\uB85C \uC704\uCE58\uB97C \uAC00\uB2A0\uD558\uBA74 \uC5B4\uAE0B\uB09C\uB2E4(\uB370\uC2A4\uD06C\uD0D1 \uC804\uC6A9 \uC774\uC288).
           bottom:0\uC73C\uB85C \uC139\uC158 \uBC15\uC2A4 \uC548\uC5D0 \uC815\uD655\uD788 \uB9DE\uCDB0 \uB460 \u2014 \uD398\uC774\uC9C0 \uB192\uC774\uB97C \uC804\uD600 \uB298\uB9AC\uC9C0 \uC54A\uC74C(\uC774\uC911 \uC2A4\uD06C\uB864 \uBC29\uC9C0 \uCD5C\uC6B0\uC120).
           \uC774 \uC0C1\uD0DC\uC5D0\uC11C\uB294 \uD0DC\uBE14\uB9BF/\uB9C8\uD034\uC5D0 \uB2E4\uC2DC \uC644\uC804\uD788 \uAC00\uB824\uC838 "\uC0B4\uC9DD \uBCF4\uC774\uB294 \uAF41\uB2E4\uB9AC" \uD6A8\uACFC\uB294 \uC5C6\uC74C(\uD2B8\uB808\uC774\uB4DC\uC624\uD504).
           \uBAA8\uBC14\uC77C\uC740 \uAE30\uC874\uC5D0 \uC815\uC0C1 \uB3D9\uC791\uD558\uB358 top:76% \uBC29\uC2DD\uC744 .cbk-mob .cbkGlow\uC5D0\uC11C \uADF8\uB300\uB85C \uBCF5\uC6D0 \u2014 \uAC74\uB4DC\uB9AC\uC9C0 \uB9D0 \uAC83. */
        .cbkGlow {
          position: absolute; left: 50%; bottom: 0; transform: translateX(-50%);
          width: clamp(220px, 26vw, 380px);
          height: clamp(170px, 19vw, 270px);
          z-index: 0; pointer-events: none;
        }
        .cbkBlob { position: absolute; border-radius: 50%; filter: blur(54px); will-change: transform; }
        .cbkBlob.b1 { width: 58%; height: 70%; left: 8%;  top: 10%;
          background: rgba(255,150,175,0.22); animation: cbkPaint1 14s ease-in-out infinite alternate; }
        .cbkBlob.b2 { width: 58%; height: 70%; right: 6%; top: 14%;
          background: rgba(165,180,255,0.20); animation: cbkPaint2 18s ease-in-out infinite alternate; }
        .cbkBlob.b3 { width: 50%; height: 58%; left: 26%; bottom: 4%;
          background: rgba(255,205,150,0.18); animation: cbkPaint3 22s ease-in-out infinite alternate; }
        @keyframes cbkPaint1 { 0%{transform:translate(0,0) scale(1);} 100%{transform:translate(9%,6%) scale(1.1);} }
        @keyframes cbkPaint2 { 0%{transform:translate(0,0) scale(1.06);} 100%{transform:translate(-8%,7%) scale(0.94);} }
        @keyframes cbkPaint3 { 0%{transform:translate(0,0) scale(0.96);} 100%{transform:translate(5%,-7%) scale(1.08);} }
        .cbkSection.cbk-reduce .cbkBlob { animation: none; }

        .cbkHead {
          position: relative; z-index: 4; text-align: center;
          width: 100%; max-width: 900px;
          margin: 0 auto clamp(20px, 2.4vw, 36px); padding: 0 20px;
        }
        .cbkTitle {
          font-weight: 700; font-size: clamp(20px, 2.6vw, 36px);
          line-height: 1.4; letter-spacing: -0.5px; color: #1C1C1C; margin: 0;
          word-break: keep-all; overflow-wrap: break-word;
        }

        /* \uC2A4\uD14C\uC774\uC9C0: \uB192\uC774\uB294 JS\uB85C \uACE0\uC815. \uC790\uC2DD\uC740 absolute + translateX \uC911\uC559(Make \uD638\uD658) */
        .cbkStage { position: relative; z-index: 2; width: 100%; }

        /* \uD0DC\uBE14\uB9BF \u2014 absolute + left:50%/translateX \uB85C \uD655\uC2E4\uD788 \uC911\uC559 (Make \uD638\uD658) */
        .cbkTablet { position: absolute; left: 50%; top: 0; transform: translateX(-50%); z-index: 2; }
        .cbkTablet img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .cbkSkeleton {
          position: absolute; inset: 0; border-radius: 20px;
          background: linear-gradient(100deg,#eef0f2 30%,#f6f7f9 50%,#eef0f2 70%);
          background-size: 200% 100%; animation: cbkShimmer 1.3s ease-in-out infinite;
        }
        .cbkSection.cbk-reduce .cbkSkeleton { animation: none; }
        @keyframes cbkShimmer { from{background-position:200% 0;} to{background-position:-200% 0;} }
        .cbkError {
          position: absolute; inset: 0; display: flex; flex-direction: column;
          align-items: center; justify-content: center; gap: 12px;
          border-radius: 20px; background: #f3f4f6; text-align: center; padding: 16px;
        }
        /* \uBCF8\uBB38 \uB300\uBE44 4.5:1 \uC774\uC0C1 (\uBC30\uACBD #f3f4f6 \uB300\uBE44 #4a4f56 \u2248 7.6:1) */
        .cbkErrorMsg { margin: 0; color: #4a4f56; font-size: 14px; font-weight: 600; line-height: 1.45; }
        .cbkRetry {
          min-height: 44px; padding: 0 18px; border: 1px solid #c4c8cd;
          border-radius: 999px; background: #ffffff; color: #2b2f35;
          font-size: 14px; font-weight: 700; cursor: pointer;
          font-family: inherit; transition: background 0.15s ease, border-color 0.15s ease;
        }
        .cbkRetry:hover { background: #f0f1f3; border-color: #aeb3b9; }
        .cbkRetry:active { background: #e6e8ea; }
        .cbkRetry:focus-visible { outline: 2px solid #2b6cff; outline-offset: 2px; }

        /* \uCC45\uD45C\uC9C0 \uBB34\uD55C \uB864\uB9C1 \u2014 \uD0DC\uBE14\uB9BF \uC911\uC559(top 62%) \uAC00\uB85C\uC9C8\uB7EC \uC55E */
        .cbkMarquee {
          position: absolute; left: 0; width: 100%; top: 62%; transform: translateY(-50%);
          height: var(--cbkMarqueeH, 240px);
          z-index: 3; overflow: hidden;
        }
        .cbkTrack {
          position: absolute; left: 0; top: 50%; z-index: 1;
          display: flex; gap: clamp(14px, 2vw, 33px);
          animation: cbkScroll 48s linear infinite; will-change: transform;
        }
        @keyframes cbkScroll {
          from { transform: translate(0, -50%); }
          to   { transform: translate(-50%, -50%); }
        }
        .cbkSection.cbk-reduce .cbkTrack { animation: none; transform: translate(0, -50%); }

        /* \uAC00\uC7A5\uC790\uB9AC \uD398\uC774\uB4DC \u2014 Figma \uC2E4\uCE21\uAC12(535\xD7327 @ 1800px \uD504\uB808\uC784, \uC6B0\uCE21 flush) \uAE30\uC900.
           535/1800 \u2248 29.7% \u2192 30%\uB85C \uBC18\uC601. \uC67C\uCABD\uC740 \uB300\uCE6D \uBBF8\uB7EC\uB9C1 \uAC00\uC815(Figma \uBCC4\uB3C4 \uAC12 \uC788\uC73C\uBA74 \uD655\uC778 \uD544\uC694). */
        .cbkFade {
          position: absolute; top: 0; height: 100%;
          width: clamp(64px, 30%, 260px);
          z-index: 2; pointer-events: none;
        }
        .cbkFadeL { left: 0; background: linear-gradient(90deg, #ffffff 0%, rgba(255,255,255,0) 100%); }
        .cbkFadeR { right: 0; background: linear-gradient(270deg, #ffffff 0%, rgba(255,255,255,0) 100%); }

        .cbkCover {
          flex: 0 0 auto;
          width: var(--cbkCoverW, 180px);
          aspect-ratio: 215 / 233;
          border-radius: 12px; overflow: hidden; background: #eef0f2;
          box-shadow: 0 8px 22px rgba(20, 25, 40, 0.12);
        }
        .cbkCover img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .cbkFallback {
          width: 100%; height: 100%;
          background: repeating-linear-gradient(45deg,#eef0f2,#eef0f2 12px,#e7e9ec 12px,#e7e9ec 24px);
        }

        /* \uBAA8\uBC14\uC77C/\uD0DC\uBE14\uB9BF (.cbk-mob) \u2014 vw \uB2E8\uC704 \uB300\uC2E0 \uCE21\uC815 \uD3ED \uAE30\uBC18 \uD074\uB798\uC2A4\uB85C \uBD84\uAE30 */
        .cbkSection.cbk-mob { padding: 36px 0 64px; }
        .cbk-mob .cbkTitle { font-size: 24px; line-height: 1.4; }
        /* \uBAA8\uBC14\uC77C: \uCC45 \uB9C8\uD034\uB97C \uC544\uB798\uB85C \uB0B4\uB824 \uD0DC\uBE14\uB9BF \uD654\uBA74 \uC548\uC5D0 \uC549\uD788\uACE0 \uC0C1\uB2E8 \uBC30\uC9C0\uC640 \uACB9\uCE68 \uBC29\uC9C0 */
        .cbk-mob .cbkMarquee { top: 60%; }
        /* \uBAA8\uBC14\uC77C\uC740 \uC774\uC804\uC5D0 \uC815\uC0C1 \uB3D9\uC791\uD558\uB358 top:76% \uC911\uC559\uC815\uB82C \uBC29\uC2DD \uADF8\uB300\uB85C \uBCF5\uC6D0 \u2014 \uB370\uC2A4\uD06C\uD0D1 bottom \uC575\uCEE4\uC640 \uBB34\uAD00 */
        .cbk-mob .cbkGlow { width: clamp(170px, 56vw, 290px); height: clamp(140px, 42vw, 230px); top: 76%; bottom: auto; transform: translate(-50%, -50%); }
        .cbk-mob .cbkBlob { filter: blur(42px); }


        /* \uC21C\uCC28 \uB4F1\uC7A5(Reveal \uC5F0\uB3D9, \uAC15\uD654 \uC2A4\uCF00\uC77C) \u2014 \uB2E8\uB3C5 \uB80C\uB354/\uC815\uC801\uC5D0\uC120 .reveal \uBD80\uC7AC\uB85C \uD56D\uC0C1 \uD45C\uC2DC */
        .reveal.armed .cbkHead, .reveal.armed .cbkStage { opacity: 0; transform: translateY(28px); }
        .reveal.in .cbkHead, .reveal.in .cbkStage { opacity: 1; transform: none; }
        .reveal.in .cbkHead { transition: opacity .7s cubic-bezier(.22,.61,.36,1) 0s, transform .7s cubic-bezier(.22,.61,.36,1) 0s; }
        .reveal.in .cbkStage { transition: opacity .8s cubic-bezier(.22,.61,.36,1) .5s, transform .8s cubic-bezier(.22,.61,.36,1) .5s; }
        /* \uD45C\uC9C0 \uD55C \uC7A5\uC529 \uC21C\uCC28 \uB4F1\uC7A5 \u2014 opacity\uB9CC(.cbkMarquee translateY(-50%) \uC815\uB82C \uBCF4\uC874) */
        .reveal.armed .cbkCover { opacity: 0; }
        .reveal.in .cbkCover { opacity: 1; transition: opacity .5s cubic-bezier(.22,.61,.36,1) 2s; }
        .reveal.in .cbkCover:nth-child(1) { transition-delay: 1.00s; }
        .reveal.in .cbkCover:nth-child(2) { transition-delay: 1.08s; }
        .reveal.in .cbkCover:nth-child(3) { transition-delay: 1.16s; }
        .reveal.in .cbkCover:nth-child(4) { transition-delay: 1.24s; }
        .reveal.in .cbkCover:nth-child(5) { transition-delay: 1.32s; }
        .reveal.in .cbkCover:nth-child(6) { transition-delay: 1.40s; }
        .reveal.in .cbkCover:nth-child(7) { transition-delay: 1.48s; }
        .reveal.in .cbkCover:nth-child(8) { transition-delay: 1.56s; }
        .reveal.in .cbkCover:nth-child(9) { transition-delay: 1.64s; }
        .reveal.in .cbkCover:nth-child(10) { transition-delay: 1.72s; }

        .psSection, .psSection * { box-sizing: border-box; }

          width: 100%; max-width: 100%; overflow-x: hidden;
          background: linear-gradient(180deg, #ffffff 0%, #f4f4f4 10%, #f4f4f4 90%, #ffffff 100%);
          /* Figma node 118:148(\uAD00\uB9AC_con, 1798\xD71044) Dev Mode \uB808\uC774\uC5B4 \uC18D\uC131 \uD328\uB110 \uC9C1\uC811 \uC2E4\uCE21(2026-07-09 \uC7AC\uD655\uC778):
             title \uB808\uC774\uC5B4 padding-box \uAE30\uC900 top=62px(\uD504\uB808\uC784 \uC0C1\uB2E8\u2192\uD5E4\uB529), left/right=271px(1798\uD3ED \uAE30\uC900 \uC911\uC559
             \uC815\uB82C \uC5EC\uBC31, \uBC18\uC751\uD615 \uC2E4\uAD6C\uD604\uC5D4 \uBBF8\uC801\uC6A9), bottom=805px(\uD5E4\uB529 \uD558\uB2E8\u2192\uD504\uB808\uC784 \uD558\uB2E8, \uC989 \uD5E4\uB529-\uCE74\uB4DC \uAC2D+\uCE74\uB4DC
             \uB192\uC774+\uD558\uB2E8 \uD328\uB529\uC758 \uD569). 805-670(\uCE74\uB4DC \uB192\uC774)-92(\uD558\uB2E8 \uD328\uB529)=43 \u2192 \uD5E4\uB529-\uCE74\uB4DC \uAC2D 43px.
             \uCD1D\uD569 62(top)+177(\uD5E4\uB529)+43(\uAC2D)+670(\uCE74\uB4DC)+92(bottom)=1044, \uD504\uB808\uC784 \uC2E4\uCE21\uACFC \uC815\uD655\uD788 \uC77C\uCE58.
             \u203B \uC774\uC804 \uBC84\uC804\uC740 top/\uAC2D \uB450 \uAC12(43\xB762)\uC774 \uC11C\uB85C \uB4A4\uBC14\uB00C\uC5B4 \uC788\uC5C8\uC74C \u2014 \uC774\uBC88\uC5D0 \uAD50\uC815.
             \uC678\uBD80 \uD770 \uAC04\uACA9(53/66)\uC740 margin\uC73C\uB85C \uBD84\uB9AC\uD574 \uBC30\uACBD\uC0C9 \uC5C6\uB294 \uC21C\uC218 \uC5EC\uBC31\uC73C\uB85C \uC720\uC9C0. */
          margin: 53px 0 66px;
          padding: 62px 20px 92px;
          font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif; color: #1b1b1b;
        }
        .psInner { max-width: 1180px; margin: 0 auto; width: 100%; }
        .psHead { text-align: center; margin-bottom: clamp(24px, 3vw, 43px); }
        .psTitle { font-weight: 700; font-size: clamp(24px, 3.1vw, 40px); line-height: 1.32; letter-spacing: -0.5px; margin: 0; color: #1b1b1b; word-break: keep-all; }
        .psTitle .accent { color: inherit; }
        .psSub { font-weight: 400; font-size: clamp(15px, 2vw, 28px); line-height: 1.5; letter-spacing: 0; color: #7a7a7a; margin: 16px 0 0; word-break: keep-all; }
        .mob .psSub span { display: block; }
        .mob .psTitle { font-size: 24px; line-height: 1.32; color: #1c1c1c; }
        .mob .psSub { font-size: 16px; color: #5d5d5d; white-space: nowrap; }

        /* \uB370\uC2A4\uD06C\uD0D1 2\uB2E8 \u2014 \uC88C:\uC6B0 = 414:780(Figma \uC2E4\uCE21 \uBE44\uC728, \uC57D 35:65) */
        .psGrid { display: grid; grid-template-columns: minmax(0, 414fr) minmax(0, 780fr); gap: clamp(14px, 1.4vw, 22px); align-items: stretch; }
        .psQList { display: flex; flex-direction: column; gap: 10px; }

        /* \uC9C8\uBB38 \uCE74\uB4DC 410\xD7160 */
        .psQCard {
          position: relative; width: 100%; max-width: 100%; aspect-ratio: 410 / 160;
          border-radius: 30px; background: #c8c8c8; border: 1.5px solid transparent;
          overflow: hidden; cursor: pointer; font: inherit; color: inherit; text-align: left; padding: 0;
          transition: border-color .35s ease, background .35s ease, box-shadow .35s ease;
        }
        .psQCard:focus-visible { outline: 3px solid #f6b8b6; outline-offset: 2px; }
        .psQCard.on { background: #ffffff; border-color: rgba(255,164,164,0.63); box-shadow: 0 10px 30px rgba(211,54,51,0.10); }
        /* \uB178\uC774\uC988 \uC624\uBC84\uB808\uC774(Figma: \uBAA8\uB178\xB7\uD06C\uAE30 0.5\xB7\uBC00\uB3C4 100%\xB7\uC0C9\uC0C1 FA0C00 10%) \u2014 SVG feTurbulence\uB85C \uC2E4\uC81C \uADF8\uB808\uC778 \uC9C8\uAC10 \uC7AC\uD604 */
        .psCardNoise { position: absolute; inset: 0; z-index: 2; pointer-events: none; opacity: 0; filter: url(#psNoiseFA0C00); transition: opacity .35s ease; }
        .psQCard.on .psCardNoise { opacity: 1; }
        /* \uBAA8\uBC14\uC77C \uC544\uCF54\uB514\uC5B8 \uCE74\uB4DC\uB294 \uD770 \uBC30\uACBD + \uC624\uB80C\uC9C0 \uBCF4\uB354 \uB514\uC790\uC778 \u2014 \uB178\uC774\uC988 \uCC44\uC6C0 \uD6A8\uACFC \uC81C\uC678 */
        .psAcc .psQCard.on .psCardNoise { opacity: 0; }
        /* Figma 586:1366/1337\uC5D4 \uC6CC\uD130\uB9C8\uD06C Q\uAC00 \uC5C6\uC74C \u2014 \uB370\uC2A4\uD06C\uD0D1\uC5D0\uC11C\uB9CC \uC228\uAE40(\uBAA8\uBC14\uC77C \uC7A5\uC2DD Q\uB294 \uBCC4\uB3C4 \uACB0\uC815 \uC720\uC9C0) */
        .psGrid .psQ { display: none; }
        .psQ { position: absolute; left: 6.5%; top: 36%; transform: translateY(-50%); font-weight: 700; font-size: clamp(46px, 7vw, 100px); line-height: 1; color: rgba(255,255,255,0.20); z-index: 0; pointer-events: none; user-select: none; transition: color .35s ease; }
        .psQCard.on .psQ { color: #edd8d8; }
        /* \uCE90\uB9AD\uD130: \uCE74\uB4DC\uBCC4 \uC815\uD655\uD55C \uC704\uCE58(charRect, \uC778\uB77C\uC778 \uC2A4\uD0C0\uC77C)\uB85C \uBC30\uCE58 \u2014 Figma 4\uAC1C \uCE74\uB4DC \uC2E4\uCE21(20/45/35/20px \uB4F1) \uAC1C\uBCC4 \uBC18\uC601 */
        .psQChar { position: absolute; object-fit: cover; object-position: top center; filter: grayscale(1) opacity(0.92); transition: filter .4s ease; z-index: 1; }
        .psQCard.on .psQChar { filter: none; }
        .psQCharFallback { background: #e6e6e6; }
        .psTag { position: absolute; left: 44.15%; top: 16.9%; z-index: 2; display: inline-flex; align-items: center; justify-content: center; padding: 0.7em 1.25em; border-radius: 100px; background: #e8e8e8; color: #989898; font-weight: 700; font-size: 14px; white-space: nowrap; transition: color .35s ease, background .35s ease; box-shadow: 0 2px 8px rgba(0,0,0,0.10); }
        .psQCard.on .psTag { background: #ffffff; color: #d33633; }
        .psBubble { position: absolute; left: 45.85%; right: 3%; top: 51.25%; z-index: 2; text-align: left; font-weight: 400; font-size: clamp(14px, 1.3cqw, 18px); line-height: 1.42; letter-spacing: -0.02em; color: #989898; word-break: keep-all; }
        .psBubble span { display: block; }
        .psQCard.on .psBubble { color: #1c1c1c; }

        /* \uD328\uB110 780\xD7670(\uAC00\uB85C\uD615, Figma \uBCC0\uACBD\uC548 2026-07-08) */

         * object-fit:fill(\uC6D0\uBCF8 \uBE44\uC728 \uBB34\uC2DC\uD558\uACE0 \uB298\uB824\uC11C \uCC44\uC6C0)\uACFC\uB294 \uB2E4\uB984 \u2014 \uC774\uC804 \uC138\uC158\uC5D0\uC11C fill\uB85C \uC798\uBABB \uC62E\uACA8 \uCE90\uB9AD\uD130
         * \uADF8\uB9BC\uC774 \uB20C\uB9AC\uACE0 \uB298\uC5B4\uB098 \uBCF4\uC774\uB294 \uC65C\uACE1("\uBE44\uC728\uB9CC \uC774\uC0C1\uD574\uC9D0") \uBC1C\uC0DD. cover\uB85C \uAD50\uCCB4\uD574 \uC65C\uACE1 \uC81C\uAC70. */
        .ebookIcons { width: 100%; height: auto; display: block; aspect-ratio: 579 / 170; object-fit: cover; }
        .ebookIconsFb { display: none; gap: 10px; }
        .ebookIconsFb span { flex: 1; text-align: center; font-size: 12px; color: var(--la-sub); }
        .sceneTabWrap { flex: 0 0 733px; }
        /* \uD06C\uB86D \uC5C6\uC74C(2026-07-08 \uCD5C\uC885) \u2014 scene_table.gif\uB294 "We like to run/jump" \uD0DC\uBE14\uB9BF \uBAA9\uC5C5 \uC804\uCCB4(\uC0C1\uD558 \uB77C\uC6B4\uB4DC
         * \uBAA8\uC11C\uB9AC \uD3EC\uD568 \uC644\uC131\uB41C \uB514\uBC14\uC774\uC2A4 \uD504\uB808\uC784)\uB97C \uB2F4\uC740 \uC790\uC0B0. \uC774\uC804\uC5D0 object-fit:cover + aspect-ratio:733/480\uC73C\uB85C
         * \uAC15\uC81C \uD06C\uB86D\uD588\uB354\uB2C8 \uD0DC\uBE14\uB9BF \uC0C1\uD558 \uB77C\uC6B4\uB4DC \uBAA8\uC11C\uB9AC\uAC00 \uC798\uB824 \uBBF8\uC644\uC131\uCC98\uB7FC \uBCF4\uC774\uB294 \uBB38\uC81C\uAC00 \uBC18\uBCF5 \uC7AC\uD604\uB428(\uC0AC\uC6A9\uC790\uAC00 \uB3D9\uC77C
         * \uC774\uC288\uB85C 3\uD68C \uC7AC\uC811\uC218) \u2014 \uC544\uC774\uCF58 \uC2A4\uD2B8\uB9BD(.ebookIcons)\uACFC \uB2EC\uB9AC \uB514\uBC14\uC774\uC2A4 \uD504\uB808\uC784 \uC2E4\uB8E8\uC5E3\uC740 \uD06C\uB86D \uC2DC \uD615\uD0DC\uAC00
         * \uAE68\uC9C0\uBBC0\uB85C \uD06C\uB86D \uC790\uCCB4\uB97C \uC81C\uAC70, \uC6D0\uBCF8 \uBE44\uC728(630\xD7510\u2192733px \uD3ED \uD658\uC0B0 593.38px \uB192\uC774) \uADF8\uB300\uB85C \uB80C\uB354. */
        .sceneTab { width: 733px; height: auto; display: block; border-radius: 18px; }

        /* ---------- Part B \u2014 \uACE0\uC815 \uC2A4\uD14C\uC774\uC9C0(1430px) + transform:scale(sB) ----------
         * \uAD6C\uC131: \uB9C8\uC2A4\uCF54\uD2B8+\uD0DC\uBE14\uB9BF \uD569\uBCF8 \uC774\uBBF8\uC9C0(890) + \uAC2D(10.32) + \uD14D\uC2A4\uD2B8 \uCEEC\uB7FC(530) \u2248 1430px, flex row \uD55C \uC904\uB85C
         * \uCC44\uC6C0(2026-07-08 \uD569\uBCF8 \uC804\uD658 \u2014 \uB9C8\uC2A4\uCF54\uD2B8 \uBCC4\uB3C4 \uB808\uC774\uC5B4/z-index \uD2B8\uB9AD \uC804\uBD80 \uC81C\uAC70, \uC774\uBBF8\uC9C0 \uC548\uC5D0 \uC774\uBBF8 \uBC00\uCC29 \uD569\uC131\uB428). */
        .pbOuter { position: relative; width: 100%; overflow: hidden; }
        .pbStage { width: 1430px; transform-origin: top left; display: flex; align-items: flex-start; position: relative; }
        /* Part A\u2192B \uAC04\uACA9\uC740 .paOuter\uC758 FIGMA.partA.gapToPartB(102px, \uB370\uC2A4\uD06C\uD0D1 \uC778\uB77C\uC778 style)\uAC00 \uB2F4\uB2F9.
         * margin-top:4px(2026-07-08 \uD6C4\uC18D23, \xA7\uD6C4\uC18D22\uC758 1px\uC5D0\uC11C +3px \uCD94\uAC00) \u2014 \uC0AC\uC6A9\uC790\uAC00 "\uC624\uB9B4\uB9AC \uD0DC\uBE14\uB9BF 3\uD53D\uC140 \uB354
         * \uB0B4\uB824\uC918"\uB85C \uC7AC\uC694\uCCAD, 1px+3px=4px. pb2Col(\uB9AC\uB4DC\uBC15\uC2A4+\uD14D\uC2A4\uD2B8\uC5F4)\uC740 \uB3C5\uB9BD\uB41C flex \uD615\uC81C \uC694\uC18C\uB77C \uC774 \uC774\uB3D9\uC5D0
         * \uC601\uD5A5\uBC1B\uC9C0 \uC54A\uC74C \u2014 con_t topOffset(53.42) \uAD00\uACC4\uAC00 4px \uC624\uCC28\uB85C \uBBF8\uBBF8\uD558\uAC8C\uB9CC \uC5B4\uAE0B\uB098\uBA70 \uC2DC\uAC01\uC801 \uC601\uD5A5\uC740 \uBB34\uC2DC
         * \uAC00\uB2A5\uD55C \uC218\uC900. */
        .pb2Device { position: relative; flex: 0 0 890px; aspect-ratio: ${up}; margin-top: 4px; margin-right: 10.32px; }
        .pb2Col { position: relative; flex: 0 0 530px; width: 530px; display: flex; flex-direction: column; transform-origin: top left; }
        /* screenArea(\uD559\uC2B5 \uC2A4\uD15D \uD654\uBA74 \uC774\uBBF8\uC9C0)\uB97C frame(\uD569\uBCF8 \uC774\uBBF8\uC9C0, \uD654\uBA74 \uC790\uB9AC\uAC00 \uC9C4\uC9DC \uC54C\uD30C \uD22C\uBA85 \uCEF7\uC544\uC6C3) \uC544\uB798
         * \uB808\uC774\uC5B4\uB85C \uBC30\uCE58 \u2014 frame\uC774 \uC704\uC5D0\uC11C \uD0DC\uBE14\uB9BF \uBCA0\uC824\uC744 \uADF8\uB9AC\uACE0, \uADF8 \uD22C\uBA85 \uAD6C\uBA4D \uC0AC\uC774\uB85C \uD654\uBA74 \uCF58\uD150\uCE20\uAC00 \uBE44\uCCD0
         * \uBCF4\uC774\uB294 \uC815\uC0C1\uC801\uC778 \uBAA9\uC5C5 \uB808\uC774\uC5B4 \uC21C\uC11C(2026-07-08, \uC0AC\uC6A9\uC790 \uC694\uCCAD\uC73C\uB85C \uCD5C\uC885 \uD655\uC815). */
        .screenArea { position: absolute; z-index: 1; overflow: hidden; }
        .frame { position: relative; z-index: 2; width: 100%; height: auto; display: block; }
        .scr { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; object-position: top center; opacity: 0; transition: opacity .5s ease; }
        .scr.on { opacity: 1; }

        .leadWrap { text-align: center; margin-bottom: 44px; }
        .pb2Col .leadWrap { margin-top: 53.42px; margin-bottom: 0; }  /* \uD68C\uC0C9 \uBC15\uC2A4(con_t) \uC2DC\uC791 = \uD0DC\uBE14\uB9BF \uBAB8\uCCB4 \uC0C1\uB2E8 + 53.42px(Figma \uC2E4\uCE21). margin-bottom:0\uC73C\uB85C \uC804\uC5ED .leadWrap\uC758 44px \uC0C1\uC18D\uC744 \uB04A\uC74C \u2014 con_t \uD558\uB2E8\u2192txt \uAC04\uACA9\uC740 .pb2Desc margin-top 30px\uC774 \uB2F4\uB2F9(Figma: con_t \uD558\uB2E8 5357 \u2192 txt 5387 = 30px) */
        .lead { font-weight: 700; font-size: 26px; line-height: 40px; color: #1C1C1C; margin: 0; }
        .leadSub1 { font-weight: 600; font-size: 24px; line-height: 40px; color: #5D5D5D; margin: 0; }
        .leadBox { display: inline-flex; flex-direction: column; align-items: center; gap: 10px; max-width: 100%; margin: 0 auto; background: #FAFAFA; border: 1px solid #EFEFEF; border-radius: 20px; padding: 27px 32px; text-align: center; }
        .leadSub2 { font-weight: 400; font-size: 24px; line-height: 40px; color: #5D5D5D; }
        .leadBox.pb2Lead { padding: 45px 36px; gap: 0; width: 530px; height: 182px; box-sizing: border-box; overflow: visible; justify-content: center; }
        .pb2Lead .lead, .pb2Lead .leadSub1, .pb2Lead .leadSub2 { white-space: nowrap; }
        .pb2Desc { width: 474px; margin: 30px 0 0 56px; animation: pb2Fade .4s ease; }
        .laSection.reduce .pb2Desc { animation: none; }
        @keyframes pb2Fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
        /* pb2DescTop(2026-07-08 \uD6C4\uC18D27, \uD6C4\uC18D28\uC5D0\uC11C \uB370\uC2A4\uD06C\uD0D1 \uBC94\uC704 \uC815\uC815) \u2014 \uD6C4\uC18D27\uC5D0\uC11C Figma node 624:116
         * \uC2E4\uCE21(\uB77C\uBCA8 bbox y:1123~1153, \uCE74\uC6B4\uD130 bbox y:1133~1143, \uC138\uB85C \uBC94\uC704 \uACB9\uCE68)\uC744 \uADFC\uAC70\uB85C \uB370\uC2A4\uD06C\uD0D1\uC5D0\uB3C4
         * flex row(\uAC19\uC740 \uD589)\uB97C \uC801\uC6A9\uD588\uC73C\uB098, \uC0AC\uC6A9\uC790\uAC00 "\uB0B4\uAC00\uBCF4\uB0B8\uAC74 \uBAA8\uBC14\uC77C \uBC84\uC804\uC784"\uC774\uB77C\uACE0 \uC815\uC815 \u2014 624:116\uC740
         * \uBAA8\uBC14\uC77C \uD504\uB808\uC784 \uC18C\uC18D \uB178\uB4DC\uC600\uC74C. \uB370\uC2A4\uD06C\uD0D1\uC740 \uC6D0\uB798 \uB3D9\uC791(\uC138\uB85C \uC2A4\uD0DD, \uAC01 29px \uD558\uB2E8 \uC5EC\uBC31)\uC73C\uB85C \uB418\uB3CC\uB9AC\uACE0,
         * flex row \uC815\uB82C\uC740 '.mob .pb2DescTop'\uC73C\uB85C \uC62E\uAE40(\uC544\uB798 \uBAA8\uBC14\uC77C \uC139\uC158 \uCC38\uC870). '.pb2DescTop' \uB798\uD37C div \uC790\uCCB4\uB294
         * JSX \uAD6C\uC870 \uC720\uC9C0\uB97C \uC704\uD574 \uB0A8\uACA8\uB450\uB418 \uB370\uC2A4\uD06C\uD0D1 \uAE30\uBCF8\uAC12\uC740 \uC2A4\uD0C0\uC77C \uC5C6\uC74C(block, \uC790\uC2DD margin\uC73C\uB85C\uB9CC \uAC04\uACA9 \uD615\uC131 \u2014
         * \uB798\uD37C \uCD94\uAC00 \uC804\uACFC \uC2DC\uAC01\uC801\uC73C\uB85C \uB3D9\uC77C). */
        .pb2DescArea { font-weight: 700; font-size: 26px; line-height: 30px; color: #1C1C1C; margin: 0 0 29px; }
        .pb2DescNum { font-family: "Plus Jakarta Sans", "Pretendard", sans-serif; font-weight: 600; font-size: 20px; line-height: 1.8; color: rgba(1,2,5,0.4); margin: 0 0 29px; font-variant-numeric: tabular-nums; }
        .pb2DescNum b { font-weight: 700; color: #010205; text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 2px; }
        .pb2DescEn { font-weight: 700; font-size: 32px; line-height: 29px; color: #1C1C1C; margin: 0; }
        .pb2DescKo { font-weight: 700; font-size: 25px; line-height: 38px; color: #1C1C1C; margin: 0 0 20px; }
        /* \uC0AC\uC6A9\uC790 \uC694\uCCAD("\uC774\uB7F0 \uD14D\uC2A4\uD2B8 \uB2E4 \uD55C\uC904\uB85C \uC624\uAC8C\uD574\uC918")\uC73C\uB85C \uAC15\uC81C 1\uC904(white-space:nowrap) \uCC98\uB9AC.
         * 6\uAC1C \uC2A4\uD15D desc \uC911 \uCD5C\uC7A5 \uBB38\uC790\uC5F4(\uBB38\uC7A54 "\uBB38\uC7A5 \uC18D \uBE48\uCE78\uC744 \uCC44\uC6B0\uBA70 \uB2E8\uC5B4\uAC00 \uBB38\uC7A5\uC774 \uB418\uB294 \uAC78 \uC775\uD600\uC694", 29\uC790)\uC774
         * \uCEE8\uD14C\uC774\uB108 \uD3ED(pb2Desc 474px) \uC548\uC5D0\uC11C \uC904\uBC14\uAFC8 \uC5C6\uC774 \uB4E4\uC5B4\uAC00\uB3C4\uB85D 25px\u219219px\uB85C \uCD95\uC18C(Pretendard \uAE00\uC790\uD3ED \uC2E4\uCE21
         * \uADFC\uC0AC\uCE58 \uAE30\uC900, \uC5EC\uC720\uD3ED \uD655\uBCF4). \u26A0\uFE0F Figma \uC6D0\uBCF8 \uC2A4\uD399\uC740 25px\uC600\uC74C \u2014 \uC774\uBC88 \uCD95\uC18C\uB294 "\uD55C \uC904 \uACE0\uC815" \uC694\uCCAD\uC744 \uC6B0\uC120\uD55C
         * \uAC83\uC73C\uB85C, Figma \uCABD \uC2E4\uC81C \uAC12\uB3C4 \uB3D9\uC77C\uD558\uAC8C \uB9DE\uCD9C\uC9C0 \uD655\uC778 \uD544\uC694("Figma \uD655\uC778 \uD544\uC694").
         * margin-bottom 34px\u219217px(2026-07-08 \uD6C4\uC18D22) \u2014 \uC0AC\uC6A9\uC790\uAC00 Figma \uCEA1\uCCD0(\uB9C8\uC9C0\uB9C9 dot~\uD0DC\uBE14\uB9BF \uD558\uB2E8 \uAC04\uACA9
         * "49.79")\uB97C \uC81C\uC2DC\uD558\uBA70 \uC2E4\uC81C \uB80C\uB354\uB3C4 \uADF8\uB9CC\uD07C \uBC8C\uC5B4\uC838\uC57C \uD55C\uB2E4\uACE0 \uC694\uCCAD. \xA7\uD6C4\uC18D17\uC5D0\uC11C\uB294 \uC774 \uD3B8\uCC28(\uC2E4\uCE21 ~31.7 vs
         * Figma 49.79, \uC57D 17px \uBD80\uC871)\uB97C "text-box-trim \uAE30\uBC18 \uD0C0\uC774\uD2B8 \uD14D\uC2A4\uD2B8 \uBC15\uC2A4 vs CSS line-height \uBC15\uC2A4" \uCC28\uC774\uB85C
         * \uBCF4\uACE0 \uCF54\uB4DC \uBCC0\uACBD \uC5C6\uC774 \uB118\uC5B4\uAC14\uC5C8\uC73C\uB098, \uC774\uBC88\uC5D4 \uC0AC\uC6A9\uC790\uAC00 \uC2DC\uAC01\uC801 \uC77C\uCE58\uB97C \uBA85\uC2DC\uC801\uC73C\uB85C \uC7AC\uC694\uCCAD \u2014 pb2DescBody\uC758
         * margin-bottom\uC744 17px \uC904\uC5EC pb2Desc \uCD1D \uB192\uC774\uB97C Figma \uBAA9\uD45C(268px)\uC5D0 \uB9DE\uCD94\uB294 \uBC29\uC2DD\uC73C\uB85C \uB300\uC751(\uB2E4\uB978 5\uAC1C \uC694\uC18C\uB294
         * \uC774\uBBF8 Figma \uAC12\uACFC \uC815\uD655\uD788 \uC77C\uCE58\uD574 \uC774 \uD56D\uBAA9\uB9CC \uC870\uC815). */
        .pb2DescBody { font-weight: 500; font-size: 19px; line-height: 29px; color: #7E7E7E; margin: 0 0 17px; white-space: nowrap; }
        .pb2Dots { display: flex; align-items: center; gap: 10px; }
        .pb2Dot { appearance: none; width: 11px; height: 11px; padding: 0; border: 0; border-radius: 999px; background: #E6E6E6; cursor: pointer; flex: 0 0 auto; transition: background .15s ease, transform .15s ease; }
        .pb2Dot:hover { background: #cfcfcf; }
        .pb2Dot.on { background: #1C1C1C; }
        .pb2Dot:active { transform: scale(.85); }
        .pb2Dot:focus-visible { outline: 2px solid rgba(106,204,141,.6); outline-offset: 2px; }

        /* ---------- \uBAA8\uBC14\uC77C (.mob JS \uD1A0\uAE00, @media \uBBF8\uC0AC\uC6A9) ---------- */
        .laSection.mob { padding: 40px 0; overflow-x: hidden; }
        .laSection.mob .laInner { width: 100%; }
        .mob .laHead { margin-bottom: 28px; padding: 0 16px; }
        .mob .laTitle { font-size: 24px; line-height: 1.3; }
        .mob .laSub { font-size: 16px; line-height: 1.5; font-weight: 400; color: #5D5D5D; }
        .mob .partA { display: flex; flex-direction: column; gap: 18px; margin-bottom: 44px; padding: 0 16px; }
        /* margin-right:0 \uCD94\uAC00(2026-07-08 \uD6C4\uC18D26) \u2014 \uB370\uC2A4\uD06C\uD0D1 '.ebookCard' \uAE30\uBCF8 \uADDC\uCE59\uC758 margin-right:45px\uAC00
         * \uBAA8\uBC14\uC77C \uC624\uBC84\uB77C\uC774\uB4DC\uC5D0\uC11C \uB9AC\uC14B\uB418\uC9C0 \uC54A\uACE0 \uADF8\uB300\uB85C \uC0C1\uC18D\uB3FC, \uCE74\uB4DC \uAC00\uC6A9 \uD3ED\uC774 45px \uC881\uC544\uC9C0\uACE0 \uC6B0\uCE21\uC73C\uB85C \uBC00\uB824\uC788\uB358
         * \uC2E4\uC81C \uBC84\uADF8(nowrap \uC791\uC5C5 \uC911 \uBC1C\uACAC \u2014 \uD3ED 313px, \uC815\uC0C1\uC774\uBA74 358px). */
        .mob .ebookCard { flex: 0 0 auto; margin-top: 0; margin-right: 0; align-items: center; }
        /* background/border \uBCF5\uC6D0(2026-07-08 \uD6C4\uC18D25) \u2014 \uC0AC\uC6A9\uC790\uAC00 Figma \uBAA8\uBC14\uC77C \uD504\uB808\uC784(node-id 413:220) \uB9C1\uD06C
         * \uACF5\uC720. get_design_context(node 413:182)\uB85C \uC2E4\uCE21\uD55C \uACB0\uACFC \uBAA8\uBC14\uC77C con_t \uCE74\uB4DC\uB3C4 \uB370\uC2A4\uD06C\uD0D1\uACFC \uB3D9\uC77C\uD558\uAC8C
         * \uD68C\uC0C9 \uBC30\uACBD+\uD14C\uB450\uB9AC(#f8f8f8, 1px solid #efefef, radius 20px)\uB97C \uC720\uC9C0\uD574\uC57C \uD558\uB294\uB370, \uC774\uC804 \uC138\uC158\uC5D0\uC11C
         * transparent/border:0\uC73C\uB85C \uC9C0\uC6CC\uC838 \uC788\uC5C8\uC74C(\uB85C\uADF8\uC5D0 \uADFC\uAC70 \uAE30\uB85D \uC5C6\uC74C, \uC6D0\uC778 \uBD88\uBA85 \u2014 Figma \uBA85\uD655\uD788 \uCE74\uB4DC

        .pr, .pr *, .pr-ov, .pr-ov * { box-sizing: border-box; }

        .pr-head p { margin: 10px 0 0; color: #484848; font-size: 28px; font-weight: 300; line-height: 40px; }

        .pr-tabs { display: flex; gap: 10px; justify-content: space-between; flex-wrap: wrap; margin: 0 auto 40px; max-width: 1200px; }

        .pr-tab:focus-visible { outline: 3px solid rgba(230,84,27,0.45); outline-offset: 2px; }
        .pr-tab[aria-selected="true"] { background: #1C1C1C; color: #FFFFFF; border-color: #5D5D5D; }

        .pr-feat li::before { content: "\u2713"; color: #5D5D5D; font-weight: 300; }
        .pr-note { display: flex; align-items: center; gap: 7px; margin: 49px 0 0; color: #929292; font-size: 15px; font-weight: 300; line-height: 1.5; letter-spacing: -0.3px; }

        .pr-thumb {
          position: relative; display: block; width: 100%; margin: 0; padding: 0; border: 0; background: transparent; cursor: pointer;
          border-radius: 16px; transition: transform .3s cubic-bezier(.2,.7,.2,1), box-shadow .3s ease;
        }
        .pr-thumb:hover, .pr-thumb:focus-visible { transform: translateY(-5px); box-shadow: 0 20px 44px rgba(0,0,0,0.16); }
        .pr-thumb:focus-visible { outline: 3px solid rgba(241,99,42,0.6); outline-offset: 4px; }
        .pr-thumbbox { position: relative; width: 100%; aspect-ratio: 628 / 410; border-radius: 16px; overflow: hidden; background: #fff; }
        .pr-thumbimg { width: 100%; height: 100%; object-fit: cover; object-position: center top; display: block; }
        .pr-badge {
          position: absolute; top: 30px; left: 30px; z-index: 3; background: rgba(230,84,27,0.85); color: #fff;
          width: 100px; height: 100px; border-radius: 50%; display: grid; place-items: center; text-align: center; font-size: 24px; font-weight: 700; line-height: 26px;
        }

        /* \uD654\uBA74\uC911\uC559 \uC624\uBC84\uB808\uC774 \u2014 \uB370\uC2A4\uD06C\uD0D1\uC740 pointer-events:none(\uD638\uBC84 \uC720\uC9C0), \uBAA8\uBC14\uC77C\uC740 \uD0ED\uC73C\uB85C \uB2EB\uAE30 */
        .pr-ov { position: fixed; inset: 0; z-index: 9998; display: flex; align-items: center; justify-content: center; padding: 4vh 4vw; background: rgba(15,18,24,0); opacity: 0; pointer-events: none; transition: opacity .3s ease, background .3s ease; }
        .pr-ov.on { opacity: 1; background: rgba(15,18,24,.55); }
        .pr-ov.on.mob { pointer-events: auto; }
        .pr-ovinner { transform: scale(.9); opacity: 0; perspective: 2800px; transition: opacity .32s ease, transform .34s cubic-bezier(.2,.7,.2,1); display: flex; align-items: center; justify-content: center; }
        .pr-ov.on .pr-ovinner { transform: scale(1); opacity: 1; }
        .pr-ovinner.words { width: clamp(300px, 56vw, 600px); }
        .pr-ovinner.book { width: clamp(320px, 74vw, 920px); }
        .pr.reduce .pr-ov { transition: opacity .2s ease; }

        .pr-ovimg { display: block; max-height: 86vh; max-width: 88vw; width: auto; border-radius: 6px; box-shadow: 0 30px 60px rgba(0,0,0,.4); background: #fff; }

        /* \uB9AC\uD3EC\uD2B8 \uD50C\uB9BD */
        .pr-flipv { perspective: 2600px; }
        .pr-flipv-in { position: relative; transform-style: preserve-3d; transition: transform .5s cubic-bezier(.2,.7,.2,1); }
        .pr-flipv-in.back { transform: rotateY(180deg); }
        .pr-flipv-face { display: block; max-height: 84vh; max-width: 86vw; width: auto; border-radius: 5px; box-shadow: 0 24px 60px rgba(0,0,0,.45); background: #fff; backface-visibility: hidden; }
        .pr-flipv-back { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform: rotateY(180deg); object-fit: contain; }

        /* \uCC45(\uB370\uC2A4\uD06C\uD0D1): \uD3BC\uCE5C \uCC45 \u2014 \uC624\uB978\uCABD \uD398\uC774\uC9C0\uB9CC \uCC45\uB4F1\uC5D0\uC11C \uB118\uAE40 */
        .pr-bk { width: 100%; display: flex; align-items: center; justify-content: center; perspective: 2600px; animation: prFade .4s ease; }
        @keyframes prFade { from { opacity: 0; } to { opacity: 1; } }
        .pr.reduce .pr-bk { animation: none; }
        .pr-bk-cover { display: block; max-height: 82vh; max-width: 100%; width: auto; border-radius: 5px; background: #fff; box-shadow: 4px 4px 0 -1px #e8e8e8, 8px 8px 0 -2px #d6d6d6, 0 24px 60px rgba(0,0,0,.45); }
        .pr-book { position: relative; width: 100%; }
        .pr-spr { position: absolute; inset: 0; display: flex; transform-style: preserve-3d; box-shadow: 0 30px 60px rgba(0,0,0,.34); border-radius: 4px; background: #fffdf7; }
        .pr-hf { position: relative; width: 50%; height: 100%; overflow: hidden; background: #fffdf7; }
        .pr-hf.left { border-radius: 6px 0 0 6px; } .pr-hf.right { border-radius: 0 6px 6px 0; }
        .pr-hf.left::after, .pr-hf.right::before { content: ""; position: absolute; top: 0; bottom: 0; width: 12%; pointer-events: none; z-index: 3; }
        .pr-hf.left::after { right: 0; background: linear-gradient(to right, transparent, rgba(0,0,0,.13)); }
        .pr-hf.right::before { left: 0; background: linear-gradient(to left, transparent, rgba(0,0,0,.13)); }
        .pr-leaf { position: absolute; top: 0; right: 0; width: 50%; height: 100%; transform-origin: left center; transform-style: preserve-3d; z-index: 4; transition: transform .85s cubic-bezier(.34,.06,.20,1); }
        .pr-face { position: absolute; inset: 0; overflow: hidden; -webkit-backface-visibility: hidden; backface-visibility: hidden; background: #fffdf7; }
        .pr-face.front { border-radius: 0 6px 6px 0; } .pr-face.back { transform: rotateY(180deg); border-radius: 6px 0 0 6px; }
        .pr-pg { width: 100%; height: 100%; background-size: 200% 100%; background-repeat: no-repeat; background-position-y: center; }
        /* \uCC45(\uBAA8\uBC14\uC77C): \uD55C \uD398\uC774\uC9C0\uC529 */
        .pr-bkm { width: 100%; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .pr-bkm-page { animation: prSlide .45s cubic-bezier(.25,.7,.3,1); }
        .pr.reduce .pr-bkm-page { animation: none; }
        @keyframes prSlide { from { transform: translateX(34%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .pr-bkm-img { display: block; max-height: 80vh; max-width: 86vw; width: auto; border-radius: 5px; background: #fff; box-shadow: 0 20px 50px rgba(0,0,0,.45); }
        .pr-bkm-slice { width: 82vw; max-width: 360px; aspect-ratio: 707 / 1000; background-size: 200% 100%; background-repeat: no-repeat; background-position-y: center; background-color: #fff; border-radius: 5px; box-shadow: 0 20px 50px rgba(0,0,0,.45); }

        /* \uB2E8\uC5B4\uD45C */
        .pr-wt { width: 100%; max-height: 84vh; overflow: auto; background: #fff; border-radius: 10px; padding: 16px 20px 20px; box-shadow: 0 30px 60px rgba(0,0,0,.4); }
        .pr-wt-head { text-align: center; margin-bottom: 12px; }
        .pr-wt-head h4 { margin: 0; font-size: 22px; font-weight: 800; color: #3C4858; }
        .pr-wt-head p { margin: 5px 0 0; font-size: 14px; font-weight: 500; color: #7a828c; }
        .pr-wt-table { border: 1px solid #e7e7e7; border-radius: 6px; overflow: hidden; }
        .pr-wt-row { display: grid; grid-template-columns: 1fr 1.3fr; border-top: 1px solid #e7e7e7; }
        .pr-wt-row:first-child { border-top: 0; }
        .pr-wt-term { background: #fdf8f1; padding: 12px; border-right: 1px solid #e7e7e7; font-weight: 700; font-size: 16px; color: #333; text-align: center; }
        .pr-wt-mean { padding: 12px; font-size: 15px; color: #444; text-align: center; }

        /* ---- \uBAA8\uBC14\uC77C / \uC911\uAC04\uD3ED ---- */
        /* 390 \uD504\uB808\uC784 \uAE30\uC900: \uD504\uB808\uC784 \uC778\uC14B 10px(\uAD6C\uBD84\uC120 x10\xB7370px), \uD14D\uC2A4\uD2B8 x24, \uC774\uBBF8\uC9C0 350 \uC911\uC559 */
        .pr.mob { padding: 32px 10px 56px; }
        .pr.mob .pr-head { margin-bottom: 23px; }
        .pr.mob .pr-head h2 { font-size: 24px; line-height: 1.3; }
        .pr.mob .pr-head p { font-size: 16px; line-height: 1.45; color: #5D5D5D; margin-top: 8px; }
        .pr.mob .pr-thumb { max-width: 350px; margin: 0 auto; }
        .pr.mob .pr-thumbbox { aspect-ratio: 350 / 220; border-radius: 20px; }
        .pr.mob .pr-badge { width: 60px; height: 60px; top: 13px; right: 11px; left: auto; font-size: 14px; line-height: 15px; background: rgba(230,84,27,0.8); backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px); }
        .pr.mob .pr-info h3 { font-size: 20px; line-height: 1.3; }
        .pr.mob .pr-info .lead { font-size: 16px; line-height: 1.5; margin: 16px 0 0; }
        /* \uAD6C\uBD84\uC120: \uD14D\uC2A4\uD2B8 \uC778\uC14B(14px)\uC744 \uC0C1\uC1C4\uD574 \uD504\uB808\uC784 \uC778\uC14B(10px)\uAE4C\uC9C0 \uD655\uC7A5 \u2192 390 \uD504\uB808\uC784\uC5D0\uC11C 370px */
        .pr.mob .pr-info hr { width: 100%; max-width: none; margin: 19px 0 16px; }
        .pr.mob .pr-feat { display: flex; flex-direction: column; gap: 8px; }
        .pr.mob .pr-feat li { font-size: 14px; font-weight: 400; line-height: 17px; }
        .pr.mob .pr-note { font-size: 12px; line-height: 17px; margin: 18px 0 0; padding: 0 7px; color: #989898; letter-spacing: -0.24px; }
        .pr.mob .pr-panel { display: flex; flex-direction: column; align-items: stretch; gap: 0; padding: 0; grid-template-areas: none; }
        .pr.mob .pr-stagewrap { order: 1; }
        .pr.mob .pr-note { order: 2; }
        /* \uD14D\uC2A4\uD2B8 \uBE14\uB85D x24 \uC778\uC14B (\uD504\uB808\uC784 10 + 14) */
        .pr.mob .pr-info { order: 3; margin-top: 23px; padding: 0 14px; }
        .pr.mob .pr-tab { height: 44px; font-size: 14px; font-weight: 300; }
        /* \uBAA8\uBC14\uC77C: \uD0ED 2\uC5F4 \uADF8\uB9AC\uB4DC(\uB77C\uBCA8 \uC548 \uC798\uB9BC) */
        .pr.mob .pr-tabs { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); row-gap: 10px; column-gap: 9px; max-width: 100%; margin-bottom: 18px; }
        .pr.mob .pr-tab { width: 100%; flex: initial; padding: 0 4px; overflow: hidden; }
        /* \uC911\uAC04\uD3ED: \uD0ED 3\uC5F4 \uADF8\uB9AC\uB4DC */

        .pr.t3 .pr-tab { width: 100%; flex: initial; padding: 0 6px; }
        /* \uD0DC\uBE14\uB9BF: \uD328\uB110 \uD3F0\uD2B8/\uAC04\uACA9 \uCD95\uC18C(\uCEEC\uB7FC \uB20C\uB9BC\xB7\uC378\uB124\uC77C \uC791\uC544\uC9D0 \uBC29\uC9C0) */
        .pr.t3 .pr-panel { grid-template-columns: 1fr 1fr; column-gap: 28px; row-gap: 0; padding: 0 8px; }
        .pr.t3 .pr-info h3 { font-size: 24px; line-height: 1.3; }
        .pr.t3 .pr-info .lead { font-size: 21px; line-height: 1.35; margin-bottom: 12px; }
        .pr.t3 .pr-info hr { width: 100%; margin: 20px 0; }
        .pr.t3 .pr-feat li { font-size: 18px; line-height: 1.7; }
        .pr.t3 .pr-note { font-size: 13px; margin-top: 20px; }
        .pr-ov.mob .pr-ovinner.words { width: 92vw; }
        .pr-ov.mob .pr-ovinner.book { width: auto; }
