<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root { --bar-h: 52px; }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body { font-family: "Pretendard", "Apple SD Gothic Neo", Arial, sans-serif; background: #eef0f3; color: #111; overflow: hidden; }
  .pvBar {
    position: fixed; top: 0; left: 0; right: 0; height: var(--bar-h); z-index: 10;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    background: #ffffff; border-bottom: 1px solid #e2e5ea; box-shadow: 0 1px 6px rgba(0,0,0,0.05);
  }
  .pvTitle { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 13px; font-weight: 700; color: #6b7280; letter-spacing: -0.2px; }
  .pvSeg { display: inline-flex; background: #f1f3f6; border-radius: 999px; padding: 4px; gap: 2px; }
  .pvBtn {
    display: inline-flex; align-items: center; gap: 6px; min-height: 36px; padding: 0 18px;
    border: 0; border-radius: 999px; background: transparent; color: #4b5563; font-weight: 700; font-size: 14px;
    font-family: inherit; cursor: pointer; transition: background .15s ease, color .15s ease, box-shadow .15s ease;
  }
  .pvBtn svg { display: block; }
  .pvBtn[aria-pressed="true"] { background: #ffffff; color: #111827; box-shadow: 0 1px 4px rgba(0,0,0,0.14); }
  .pvBtn:hover:not([aria-pressed="true"]) { color: #111827; }
  .pvBtn:focus-visible { outline: 3px solid #FF6427; outline-offset: 2px; }
  .pvStage { position: fixed; top: var(--bar-h); left: 0; right: 0; bottom: 0; display: flex; justify-content: center; align-items: flex-start; overflow: hidden; }
  .pvStage.mobile { padding: 18px 0; overflow-y: auto; background: #e6e9ee; }
  .pvFrame { width: 100%; height: 100%; border: 0; background: #fff; display: block; }
  .pvStage.mobile .pvFrame {
    width: 390px; height: 844px; max-height: calc(100vh - var(--bar-h) - 36px);
    border-radius: 28px; box-shadow: 0 12px 40px rgba(20,25,45,0.22); border: 1px solid #d5d9e0;
  }
</style>
</head>

  <script>
    (function () {
      var b64 = document.getElementById("landingB64").textContent.trim();
      var html = decodeURIComponent(escape(atob(b64)));
      var frame = document.getElementById("pvFrame");
      var stage = document.getElementById("pvStage");
      var pc = document.getElementById("pvPc");
      var mob = document.getElementById("pvMob");
      var current = null;

      frame.addEventListener("load", function () {
        var win = frame.contentWindow;
        if (!win) return;
        function nudge() {
          if (stage.classList.contains("mobile")) {
            frame.style.width = "389px";
            requestAnimationFrame(function () { frame.style.width = ""; });
          }
          try { win.dispatchEvent(new Event("resize")); } catch (e) {}
        }
        [0, 80, 250, 600].forEach(function (t) { setTimeout(nudge, t); });
      });

      function loadFrame() {
        requestAnimationFrame(function () {
          requestAnimationFrame(function () { frame.srcdoc = html; });
        });
      }
      function applyMode(mode, reload) {
        var isMob = mode === "mobile";
        stage.classList.toggle("mobile", isMob);
        pc.setAttribute("aria-pressed", String(!isMob));
        mob.setAttribute("aria-pressed", String(isMob));
        if (reload) loadFrame();
        current = mode;
        try { localStorage.setItem("pvMode", mode); } catch (e) {}
      }
      function setMode(mode) { if (mode !== current) applyMode(mode, true); }
      pc.addEventListener("click", function () { setMode("pc"); });
      mob.addEventListener("click", function () { setMode("mobile"); });
      var saved = "pc";
      try { saved = localStorage.getItem("pvMode") || "pc"; } catch (e) {}
      applyMode(saved, true);
    })();
  </script>
